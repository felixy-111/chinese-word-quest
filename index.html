<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6abe30">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>生字大冒險</title>
<style>
:root{
  --sky1:#79c7ee; --sky2:#bfe9ff;
  --grass:#6abe30; --grass-d:#4a8a1f; --grass-l:#7ed149;
  --dirt:#9b6a43; --dirt-d:#6e4a2a;
  --stone:#9a9a9a; --stone-d:#6f6f6f;
  --wood:#bb8a52; --wood-d:#8a6238;
  --diamond:#3fd0e0; --diamond-d:#2a9fad;
  --gold:#ffd83d; --exp:#7ee03f; --exp-d:#4fa019;
  --red:#d24b3e; --green:#5aa83c; --heart:#e23b3b;
  --ink:#2b2118; --panel:#fffdf5; --panelline:#e6dcc4;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%; overscroll-behavior-y:none;}
/* 就算個別情境仍擠出橡皮筋，露出的也是天空→草地，不再有「好玩的空白」 */
html{background:linear-gradient(180deg,var(--sky1),#8fce5a);}
body{
  font-family:'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--sky1),var(--sky2) 55%, #cdeeb0 80%, #8fce5a 100%);
  background-attachment:fixed; min-height:100%;
  -webkit-user-select:none; user-select:none; overflow-x:hidden;
}
.kai{font-family:'BiauKai','標楷體','DFKai-SB',serif;}
/* 像素雲背景 */
.sky{position:fixed; inset:0; z-index:-2; overflow:hidden; pointer-events:none;}
.cloud{position:absolute; width:60px; height:18px; background:#fff; border-radius:3px;
  box-shadow: 22px -12px 0 0 #fff, 44px 0 0 0 #fff, 22px 0 0 8px #fff, -10px 0 0 0 #fff;
  opacity:.85; animation:drift linear infinite;}
@keyframes drift{ from{transform:translateX(-140px) scale(var(--s,1));} to{transform:translateX(110vw) scale(var(--s,1));} }
/* 地面草皮條（固定底部） */
.ground{position:fixed; left:0; right:0; bottom:0; height:46px; z-index:-1; pointer-events:none;
  background:repeating-linear-gradient(90deg,var(--grass) 0 24px,var(--grass-l) 24px 48px);
  box-shadow: inset 0 7px 0 var(--grass-l), inset 0 -30px 0 var(--dirt), inset 0 -46px 0 var(--dirt-d);}
.block{
  border:3px solid rgba(0,0,0,.25);
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.35), inset -3px -3px 0 rgba(0,0,0,.22), 4px 4px 0 rgba(0,0,0,.18);
  border-radius:4px;
}
.btn{
  cursor:pointer; border:none; font-family:inherit; font-weight:800; color:#fff;
  padding:12px 16px; font-size:18px; border-radius:6px; letter-spacing:1px;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.32), inset -4px -4px 0 rgba(0,0,0,.28), 3px 4px 0 rgba(0,0,0,.2);
  transition:transform .05s;
}
.btn:active{transform:translateY(2px); box-shadow: inset 3px 3px 0 rgba(255,255,255,.25), inset -3px -3px 0 rgba(0,0,0,.3);}
.btn-grass{background:var(--grass);} .btn-dirt{background:var(--dirt);}
.btn-stone{background:var(--stone);} .btn-wood{background:var(--wood);}
.btn-diamond{background:var(--diamond); color:#0a4a52;}
.btn-gold{background:var(--gold); color:#5a4500;}
.btn-red{background:var(--red);} .btn-green{background:var(--green);}
.wrap{max-width:980px; margin:0 auto; padding:14px; padding-bottom:60px;}
header.bar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:var(--dirt); color:#fff; padding:10px 14px; margin:-14px -14px 14px;
  box-shadow: inset 0 5px 0 var(--grass), inset 0 9px 0 var(--grass-l), inset 0 -4px 0 var(--dirt-d);
}
header.bar h1{font-size:20px; margin:0; letter-spacing:2px; text-shadow:2px 2px 0 rgba(0,0,0,.3);}
header.bar .sp{flex:1;}
.pill{background:rgba(0,0,0,.18); padding:5px 10px; border-radius:20px; font-size:13px; font-weight:700;}
.iconbtn{background:rgba(0,0,0,.18); border:none; color:#fff; cursor:pointer; font-size:18px; padding:6px 10px; border-radius:6px;}
.iconbtn.on{background:var(--gold); color:#5a4500;}

.hero{text-align:center; padding:24px 10px;}
.hero .logo{font-size:46px; font-weight:900; letter-spacing:4px; color:#fff;
  text-shadow:3px 3px 0 var(--dirt-d), 0 0 2px #000; margin-bottom:6px;}
.hero .torch{font-size:30px; margin:0 8px; filter:drop-shadow(0 0 6px #ffb53d);}
.hero .sub{color:#2f5320; font-weight:800; margin-bottom:20px; background:rgba(255,255,255,.55);
  display:inline-block; padding:5px 14px; border-radius:20px;}
.grade-grid{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.grade-card{width:160px; padding:18px; background:var(--grass); color:#fff; text-align:center; cursor:pointer;}
.grade-card .t{font-size:24px; font-weight:900; text-shadow:2px 2px 0 var(--grass-d);}
.grade-card .d{font-size:13px; opacity:.9; margin-top:6px;}
.grade-card.locked{background:var(--stone); cursor:not-allowed; opacity:.85;}
.grade-card.archived{filter:grayscale(1); opacity:.55;}
.grade-card .arch-note{font-size:11px; margin-top:6px; opacity:.95;}
.home-sec{margin-top:8px;}
.home-h{font-size:15px; font-weight:900; color:#2f5320; background:rgba(255,255,255,.55);
  display:inline-block; padding:4px 14px; border-radius:16px; margin-bottom:10px;}

.lesson-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
.lesson-card{padding:14px; background:var(--wood); color:#fff; cursor:pointer; position:relative;}
.lesson-card .no{font-size:12px; opacity:.85;}
.lesson-card .nm{font-size:19px; font-weight:900; margin-top:4px; text-shadow:1px 1px 0 var(--wood-d);}
.lesson-card .meta{font-size:12px; margin-top:8px; opacity:.9;}
.lesson-card .bar2{height:9px; background:rgba(0,0,0,.28); border-radius:5px; margin-top:6px; overflow:hidden;
  box-shadow: inset 0 2px 2px rgba(0,0,0,.3);}
.lesson-card .bar2 i{display:block; height:100%; background:var(--exp); box-shadow:0 0 6px var(--exp);}

.modeswitch{display:flex; gap:8px; margin-bottom:12px;}
.modeswitch .btn{flex:1; font-size:16px;}
.modeswitch .btn.dim{filter:grayscale(.55) brightness(.9);}

.card{background:var(--panel); padding:20px; text-align:center; position:relative;}
.card::before{content:""; position:absolute; inset:0; border-radius:4px; pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.5), transparent 8px);}
.charrow{display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;}
.char-big{font-size:96px; line-height:1.1; cursor:pointer; color:var(--ink); text-shadow:2px 2px 0 #d8cdb0;}
.char-big:active{transform:scale(.96);}
.zhuyin{font-size:30px; color:var(--red); font-weight:700; letter-spacing:1px;}
.spk{font-size:13px; color:var(--diamond-d); font-weight:700; margin-top:4px;}
.fields{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
.field{background:#fff; border:2px solid var(--panelline); border-radius:6px; padding:10px; text-align:left;}
.field .lab{font-size:12px; color:#9a8c6a; font-weight:700;}
.field .val{font-size:18px; font-weight:700; margin-top:2px;}
.field.full{grid-column:1/3;}
.tagrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
.tag{background:var(--sky2); color:#1b5566; padding:3px 9px; border-radius:14px; font-size:15px; cursor:pointer; font-weight:700;}
details.adv{margin-top:12px; background:#f3eeda; border-radius:6px; padding:8px 12px; text-align:left;}
details.adv summary{cursor:pointer; font-weight:800; color:var(--dirt-d);}
details.adv .ac{margin-top:8px; font-size:15px; line-height:1.6;}
details.patbox:not([open]) > :not(summary){display:none !important;}
.navrow{display:flex; align-items:center; gap:10px; margin-top:16px;}
.navrow .btn{flex:1;}
.counter{font-weight:800; color:var(--dirt-d); min-width:70px; text-align:center;}

/* 抽考 */
.quizsetup .opt{display:flex; align-items:center; gap:8px; background:#fff; border:2px solid var(--panelline);
  padding:10px; border-radius:6px; margin-bottom:8px; cursor:pointer; font-weight:700;}
.quizsetup .opt input{width:20px; height:20px;}
.q-prompt{font-size:18px; color:var(--dirt-d); font-weight:800; margin-bottom:10px;}
/* 經驗條 + 愛心 HUD */
.hud{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
.hearts{font-size:18px; letter-spacing:1px;}
.expbar{flex:1; min-width:120px; height:16px; background:#3a3a3a; border-radius:4px; overflow:hidden;
  box-shadow: inset 0 2px 3px rgba(0,0,0,.5); border:2px solid #222;}
.expbar i{display:block; height:100%; background:repeating-linear-gradient(90deg,var(--exp) 0 8px,var(--exp-d) 8px 10px);
  transition:width .2s;}
.hudtxt{font-weight:800; color:var(--dirt-d); font-size:14px;}
/* 生詞提示 */
.hintword{display:inline-block; background:#fff7d6; border:2px dashed var(--gold); color:#6a5200;
  padding:8px 16px; border-radius:8px; font-size:24px; font-weight:800; margin:8px 0;}
.hintword .zy{color:var(--red);}
.cover-wrap{position:relative; display:inline-block; margin:6px auto;}
.answer-box{background:#fff; border:2px dashed var(--diamond-d); border-radius:8px; padding:18px 26px; min-width:200px;}
.cover{position:absolute; inset:0; border-radius:8px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:15px; cursor:pointer;
  background:#8b5a2b; background-image:
    linear-gradient(335deg, rgba(0,0,0,.18) 23px, transparent 23px),
    linear-gradient(155deg, rgba(0,0,0,.18) 23px, transparent 23px),
    repeating-linear-gradient(0deg,#9b6a43 0 14px,#8a5d39 14px 28px),
    repeating-linear-gradient(90deg,#9b6a43 0 14px,#8a5d39 14px 28px);
  box-shadow: inset 4px 4px 0 rgba(255,255,255,.18), inset -4px -4px 0 rgba(0,0,0,.32);}
.peek{position:absolute; top:-10px; right:-10px; width:48px; height:48px; border-radius:8px;
  background:var(--gold); color:#5a4500; border:3px solid #fff; cursor:pointer; font-size:22px; font-weight:900;
  display:flex; align-items:center; justify-content:center; box-shadow:2px 2px 0 rgba(0,0,0,.3); touch-action:none;}
.crack{position:absolute; inset:0; opacity:0; pointer-events:none; border-radius:8px; transition:opacity .04s;
  background:
    linear-gradient(48deg, transparent 47%, rgba(0,0,0,.6) 48% 50%, transparent 51%),
    linear-gradient(-28deg, transparent 58%, rgba(0,0,0,.55) 59% 61%, transparent 62%),
    linear-gradient(75deg, transparent 38%, rgba(0,0,0,.5) 39% 41%, transparent 42%),
    linear-gradient(-65deg, transparent 68%, rgba(0,0,0,.45) 69% 71%, transparent 72%);}
.cover.breaking{animation:blockbreak .38s ease-in forwards; pointer-events:none;}
@keyframes blockbreak{0%{transform:scale(1);}30%{transform:scale(1.05) translateY(-3px);}100%{transform:scale(.55) translateY(10px) rotate(4deg); opacity:0;}}
.debris{position:fixed; width:12px; height:12px; background:#8a5d39; border:2px solid #6e4a2a; z-index:60; pointer-events:none; animation:fly .8s ease-out forwards;}
@keyframes fly{
  0%{transform:translate(0,0) rotate(0); opacity:1;}
  35%{transform:translate(calc(var(--dx) * .55), var(--up)) rotate(150deg); opacity:1;}
  100%{transform:translate(var(--dx), var(--down)) rotate(400deg); opacity:0;}
}
.judge{display:flex; gap:10px; margin-top:16px;}
.judge .btn{flex:1; font-size:20px;}
.statline{font-weight:800; color:var(--dirt-d); margin:8px 0;}
.bigstat{text-align:center; padding:14px;}
.levelup{font-size:22px; font-weight:900; color:var(--gold); text-shadow:2px 2px 0 var(--dirt-d); letter-spacing:2px;
  animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
.bigstat .num{font-size:52px; font-weight:900; color:var(--grass-d);}
.wrongchip{display:inline-block; background:#ffe1dc; color:var(--red); padding:6px 12px; border-radius:16px;
  margin:4px; font-size:22px; font-weight:800; cursor:pointer; font-family:'BiauKai',serif;}
.hint{font-size:13px; color:#8a7c5a; text-align:center; margin-top:8px;}
.empty{text-align:center; color:#8a7c5a; padding:30px; font-weight:700;}
/* ── 遊戲化 ── */
.topxp{display:flex; align-items:center; gap:8px; background:rgba(0,0,0,.16); border-radius:8px; padding:6px 10px; margin-bottom:12px; cursor:pointer; flex-wrap:wrap;}
.topxp .lv{background:var(--gold); color:#5a4500; font-weight:900; padding:2px 8px; border-radius:6px; font-size:13px; white-space:nowrap;}
.topxp .xpbar{flex:1; min-width:80px; height:12px; background:#3a3a3a; border-radius:3px; overflow:hidden; border:2px solid #222;}
.topxp .xpbar i{display:block; height:100%; background:repeating-linear-gradient(90deg,var(--exp) 0 6px,var(--exp-d) 6px 8px); transition:width .3s;}
.topxp .mini{font-weight:800; color:var(--ink); font-size:13px; white-space:nowrap;}
.toast{position:fixed; top:14px; right:-380px; max-width:320px; background:#2b2118; color:#fff; border:3px solid var(--gold);
  border-radius:8px; padding:12px 16px; font-weight:800; z-index:200; box-shadow:4px 4px 0 rgba(0,0,0,.3);
  transition:right .4s cubic-bezier(.2,1.2,.4,1);}
.toast.show{right:14px;}
.toast.level{border-color:var(--exp);} .toast.gem{border-color:var(--diamond);}
.combopop{position:fixed; left:50%; top:38%; z-index:150; pointer-events:none; font-size:38px; font-weight:900;
  color:var(--gold); text-shadow:3px 3px 0 var(--dirt-d), 0 0 8px #ffb53d; opacity:0; animation:combopop .75s ease forwards;}
@keyframes combopop{0%{transform:translate(-50%,-50%) scale(.4); opacity:0;} 35%{transform:translate(-50%,-50%) scale(1.25); opacity:1;} 100%{transform:translate(-50%,-95%) scale(1); opacity:0;}}
.gemwall{display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin:8px 0;}
.gem{aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:22px;
  background:#cfc4a8; color:#fff; box-shadow: inset 2px 2px 0 rgba(255,255,255,.3), inset -2px -2px 0 rgba(0,0,0,.2);}
.gem.got{background:linear-gradient(135deg,var(--diamond),var(--diamond-d));}
.achvrow{display:flex; align-items:center; gap:10px; background:#fff; border:2px solid var(--panelline); border-radius:6px; padding:8px 10px; margin-bottom:6px;}
.achvrow.locked{opacity:.45; filter:grayscale(1);}
.achvrow .ic{font-size:24px;} .achvrow .nm{font-weight:800;} .achvrow .ds{font-size:12px; color:#8a7c5a;}
.zoowall{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:8px 0;}
.zoocell{background:#efe7d2; border-radius:8px; padding:6px 4px; text-align:center; min-height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.zoocell.got{background:#dff0c8;}
.zoocell .zoosvg{height:32px; display:flex; align-items:flex-end; justify-content:center;}
.zoocell .zoosvg svg{height:32px; width:auto;}
.zoowall svg{animation:none !important;} .zoowall svg *{animation:none !important;}
.zoocell .zooname{font-size:11px; color:#5a4a2a; margin-top:3px; font-weight:700; line-height:1.2;}
.zoocell .zoolock{font-size:22px; color:#b8ac90; height:32px; display:flex; align-items:center;}
.zoocell:not(.got) .zooname{color:#a59a7a;}
.msrow{display:flex; align-items:center; gap:10px; background:#fff; border:2px solid var(--panelline); border-radius:6px; padding:6px 10px; margin-bottom:6px; cursor:pointer;}
.msrow.got{background:#dff0c8;}
.msrow .mssvg{width:48px; text-align:center;} .msrow .mssvg svg{height:30px; width:auto;}
.msrow svg{animation:none !important;} .msrow svg *{animation:none !important;}
.msrow .msname{font-weight:800;} .msrow .msrange{font-size:12px; color:#8a7c5a;}
/* ── 第二波：視覺沈浸 ── */
#loading{position:fixed; inset:0; z-index:500; background:linear-gradient(180deg,#16213e,#0f3320);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity .5s;}
#loading.hide{opacity:0; pointer-events:none;}
#loading .lblock{width:54px; height:54px; background:linear-gradient(135deg,var(--grass),var(--grass-d));
  box-shadow: inset 4px 4px 0 rgba(255,255,255,.3), inset -4px -4px 0 rgba(0,0,0,.3); border-radius:6px; animation:lspin 1.2s ease-in-out infinite;}
@keyframes lspin{0%,100%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.15);}}
#loading .ltxt{color:#fff; font-size:26px; font-weight:900; letter-spacing:2px; text-shadow:2px 2px 0 #000;}
#loading .lhint{color:#9fe6b0; font-size:14px; font-weight:700;}
.critters{position:fixed; left:0; right:0; bottom:5px; height:40px; z-index:5; pointer-events:none; overflow:hidden;}
.critter{position:absolute; bottom:0; left:-50px; animation:walk linear infinite;}
@keyframes walk{ from{transform:translateX(-50px);} to{transform:translateX(102vw);} }
.critter .hop{display:block; animation:hop 3.2s ease-in-out infinite;}
@keyframes hop{0%,80%,100%{transform:translateY(0);} 86%{transform:translateY(-9px);} 92%{transform:translateY(0);} 96%{transform:translateY(-4px);}}
.birds{position:fixed; left:0; right:0; top:0; height:48%; z-index:-1; pointer-events:none; overflow:hidden;}
.bird{position:absolute; left:-60px; animation:birdfly linear infinite;}
@keyframes birdfly{ from{transform:translateX(-60px);} to{transform:translateX(105vw);} }
.bird svg{display:block; animation:flap .32s ease-in-out infinite;}
@keyframes flap{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}
.bird svg .wing{transform-box:fill-box; transform-origin:88% 80%; animation:wflap .2s ease-in-out infinite;}
@keyframes wflap{0%,100%{transform:rotate(-40deg);}50%{transform:rotate(32deg);}}
.rare{display:inline-block; filter:drop-shadow(0 0 5px rgba(255,216,61,.85));}
#buddy{position:fixed; left:0; bottom:6px; z-index:5; pointer-events:none; animation:bwalk 22s linear infinite;}
@keyframes bwalk{0%{transform:translateX(2vw);}48%{transform:translateX(82vw);}50%{transform:translateX(82vw) scaleX(-1);}98%{transform:translateX(2vw) scaleX(-1);}100%{transform:translateX(2vw);}}
#buddy svg{animation:bstep .42s ease-in-out infinite;}
@keyframes bstep{0%,100%{transform:translateY(0) rotate(-2.5deg);}50%{transform:translateY(-3px) rotate(2.5deg);}}
#buddy svg.react-happy{animation:rhappy .5s ease 3;}
@keyframes rhappy{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-10px) scale(1.12);}}
#buddy svg.react-sad{animation:rsad .4s ease 3;}
@keyframes rsad{0%,100%{transform:translateX(0) rotate(0);}25%{transform:translateX(-4px) rotate(-6deg);}75%{transform:translateX(4px) rotate(6deg);}}
.torch2{display:inline-block; width:8px; height:22px; background:var(--wood); position:relative; vertical-align:middle; border-radius:2px; margin:0 10px;}
.torch2::before{content:""; position:absolute; top:-11px; left:-4px; width:16px; height:17px;
  background:radial-gradient(circle at 50% 70%, #fff3b0, #ffb53d 45%, #ff6a00 78%, transparent 85%);
  border-radius:50% 50% 45% 45%/60% 60% 40% 40%; animation:flame .25s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scaleY(1) scaleX(1); opacity:.88;}to{transform:scaleY(1.18) scaleX(.88); opacity:1;}}
/* 筆順 modal */
.smodal{position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center;}
.smodal.show{display:flex;}
.sbox{background:var(--panel); border-radius:10px; padding:18px; text-align:center; box-shadow:6px 6px 0 rgba(0,0,0,.3);}
.schar{width:220px; height:220px; margin:0 auto; background:#fff; border:2px solid var(--diamond-d); border-radius:8px;
  background-image:linear-gradient(var(--panelline) 1px,transparent 1px),linear-gradient(90deg,var(--panelline) 1px,transparent 1px); background-size:50% 50%, 50% 50%;}
.srow{display:flex; gap:10px; margin-top:12px;} .srow .btn{flex:1;}
/* 解鎖慶祝彈窗 */
.umodal{position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; overflow:hidden;}
.umodal.show{display:flex;}
.ubox{background:var(--panel); border:4px solid var(--gold); border-radius:14px; padding:24px 30px; text-align:center;
  box-shadow:0 0 0 6px rgba(255,216,61,.35), 8px 8px 0 rgba(0,0,0,.3); animation:upop .5s cubic-bezier(.2,1.4,.4,1);}
@keyframes upop{0%{transform:scale(.3) rotate(-8deg); opacity:0;} 100%{transform:scale(1) rotate(0); opacity:1;}}
.utitle{font-size:26px; font-weight:900; color:#e6a700; text-shadow:2px 2px 0 var(--dirt-d); letter-spacing:2px;}

/* ── 合成閃亮版：金光包裝＋星星閃爍（不重畫像素，套在既有 SVG 外） ── */

.eggwrap .egghint{font-size:13px; font-weight:800; color:#8a6d00; background:#fff7d6; border:2px dashed var(--gold);

<script>
"use strict";
const DATA = window.WORDS_DATA || {grades:[]};
const APP_VER = "v51｜2026.07.14";
const LS_KEY = "cwq_state_v1";
let store = loadStore();
function loadStore(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return {}} }
function saveStore(){ localStorage.setItem(LS_KEY, JSON.stringify(store)); }
store.seen = store.seen || {};
store.wrong = store.wrong || {};
store.opt = store.opt || {voice:true, sound:true};
store.xp = store.xp || 0;
store.achv = store.achv || {};            // 成就 id -> 1
store.collected = store.collected || {};  // "gi|li" -> 1（該課抽考全對得礦石）
store.streak = store.streak || 0;
store.lastDay = store.lastDay || "";
store.stats = store.stats || {quizOk:0, quizTotal:0};
store.maxStreak = store.maxStreak || 0;
store.rares = store.rares || {};          // 里程碑稀有解鎖： key -> 1
if(store.daysCount===undefined) store.daysCount = store.maxStreak||0;  // 累積學習天數（不需連續）
store.lessonStats = store.lessonStats || {};   // 每課抽考 "gi|li" -> {ok,total}
store.coins = store.coins || 0;                // 金幣（買配件）
store.gear = store.gear || {owned:{}, equipped:{}};  // 配件：owned key->1；equipped slot->key
store.lessonDone = store.lessonDone || {};     // "gi|li" -> 1（該關複習首次完成，領過蛋）
store.daily = store.daily || null;             // 每日任務 {date,seen,ok,lesson,claimed}
store.shiny = store.shiny || {};               // 合成閃亮版：動物 key -> 1（3 隻同種合成，永久）
// store.zoo（動物 key -> 擁有數量）在生物清單定義後做一次性遷移（見 migrateZoo）

let S = {gi:0, li:0, mode:"review", ci:0, quiz:null, range:null};

// ====== 像素雲 ======
(function makeClouds(){
  const sky=document.getElementById("sky");
  for(let i=0;i<7;i++){
    const c=document.createElement("div"); c.className="cloud";
    c.style.top=(2+Math.random()*42).toFixed(1)+"%";                 // 高度隨機（上半天空）
    c.style.setProperty("--s",(0.5+Math.random()*1.1).toFixed(2));   // 大小隨機 0.5~1.6（飛行時保持）
    c.style.animationDuration=(26+Math.random()*44).toFixed(1)+"s";  // 速度隨機 26~70s
    c.style.animationDelay=(-Math.random()*45).toFixed(1)+"s";       // 起始錯開
    c.style.opacity=(0.68+Math.random()*0.24).toFixed(2);           // 濃淡略不同
    sky.appendChild(c);
  }
})();

// ====== 語音 ======
let zhVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices(); if(!vs.length) return null;
  const pref=["Meijia","美佳","Sinji","善怡","Shelley","Sandy","Yu-shu","Mei-Jia"];
  let v=vs.find(x=>/zh-TW|zh_TW/i.test(x.lang)&&pref.some(p=>x.name.includes(p)));
  v=v||vs.find(x=>/zh-TW|zh_TW/i.test(x.lang))||vs.find(x=>/zh|Chinese/i.test(x.lang));
  return v;
}
function getVoice(){ if(!zhVoice) zhVoice=pickVoice(); return zhVoice; }
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=()=>{zhVoice=pickVoice();}; }
let _ttsUnlocked=false;
function unlockTTS(){ if(_ttsUnlocked||!("speechSynthesis" in window))return; _ttsUnlocked=true;
  try{ const u=new SpeechSynthesisUtterance(" "); u.volume=0; speechSynthesis.speak(u); }catch(e){} }
window.addEventListener("pointerdown", unlockTTS, {once:true});
window.addEventListener("touchstart", unlockTTS, {once:true});
// ── 鎖 iOS 橡皮筋滾動（學生會拉著空白區玩）：頁面已在頂/底還往外拉就擋掉 ──
let _touchY=0;
document.addEventListener("touchstart", e=>{ _touchY=e.touches[0].clientY; }, {passive:true});
document.addEventListener("touchmove", e=>{
  const t=e.target && e.target.tagName;
  if(t==="TEXTAREA"||t==="SELECT"||t==="INPUT") return;   // 存檔欄等可捲元件放行
  const el=document.scrollingElement||document.documentElement;
  const dy=e.touches[0].clientY-_touchY;
  const atTop=el.scrollTop<=0, atBottom=el.scrollTop+window.innerHeight>=el.scrollHeight-1;
  if((atTop&&dy>0)||(atBottom&&dy<0)) e.preventDefault();
}, {passive:false});
// ── 單字發音一律念「課本注音」（v51）──
// 美佳(Meijia)引擎原生支援注音字串直接合成正確讀音（實測「ㄏㄤˊ」與「航」輸出位元組相同），
// 破音字不會再抓錯讀音；念詞/念句仍用文字（詞語讀音本來就穩）。
function charSay(c){ return c.zhuyin || c.say || c.char; }
let _zyMap=null;   // 字 → 注音索引（錯題本只存字，念音時查這裡）
function zhuyinOf(ch){
  if(!_zyMap){ _zyMap={};
    DATA.grades.forEach(g=>g.lessons.forEach(l=>l.chars.forEach(c=>{ if(c.zhuyin && !_zyMap[c.char]) _zyMap[c.char]=c.zhuyin; }))); }
  return _zyMap[ch]||null;
}
function speak(text){
  if(!store.opt.voice || !("speechSynthesis" in window)) return;
  const ss=window.speechSynthesis;
  try{ ss.cancel(); }catch(e){}
  const u=new SpeechSynthesisUtterance(text);
  const v=getVoice(); u.lang="zh-TW"; if(v){u.voice=v;}
  u.rate=0.85; u.pitch=1; u.volume=1;
  ss.speak(u);
  setTimeout(()=>{ try{ if(ss.paused) ss.resume(); }catch(e){} }, 60);
}

// ====== Minecraft 風音效（Web Audio 合成）======
let actx=null;
function ac(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}} if(actx&&actx.state==="suspended")actx.resume(); return actx; }
function tone(freq,dur,type,vol,when){
  if(!store.opt.sound) return; const a=ac(); if(!a)return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||"square"; o.frequency.value=freq;
  const t=a.currentTime+(when||0); g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur);
}
function noise(dur,vol,when){
  if(!store.opt.sound) return; const a=ac(); if(!a)return;
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=a.createBufferSource(); src.buffer=buf;
  const g=a.createGain(); g.gain.value=vol||0.05; const t=a.currentTime+(when||0);
  const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=800;
  src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t);
}
const sPlace=()=>{ tone(160,.05,"square",.06); noise(.05,.04); };          // 放方塊
const sClick=()=>{ tone(330,.04,"square",.05); };                          // 點擊
const sOk  =()=>{ [740,990,1320].forEach((f,i)=>tone(f,.10,"sine",.06,i*.06)); }; // 經驗球
const sNo  =()=>{ tone(180,.22,"sawtooth",.08); tone(120,.22,"sawtooth",.06,.05); noise(.12,.05); }; // 受傷
const sDig =()=>{ for(let i=0;i<3;i++){ noise(.05,.05,i*.06); tone(90+i*15,.05,"square",.04,i*.06);} }; // 挖掘
const sWin =()=>{ [523,659,784,1046,1318].forEach((f,i)=>tone(f,.14,"square",.06,i*.10)); };          // 升級
const sBreak=()=>{ tone(130,.12,"square",.09); tone(70,.16,"sawtooth",.06,.02); noise(.2,.10); setTimeout(()=>{noise(.08,.05);},70); }; // 破壞方塊
const sAchv=()=>{ [880,1175,1568].forEach((f,i)=>tone(f,.12,"sine",.06,i*.08)); };           // 成就解鎖
const sComboTone=(n)=>{ const b=520+Math.min(n,14)*38; tone(b,.10,"square",.06); tone(b*1.5,.08,"sine",.04,.04); }; // 連擊漸高
const sGem=()=>{ [1047,1319,1568,2093].forEach((f,i)=>tone(f,.10,"sine",.05,i*.05)); };       // 撿礦石

const grade=()=>DATA.grades[S.gi];
const lesson=()=>grade().lessons[S.li];
function currentChars(){ return S.range ? S.range.chars : lesson().chars; }
function sampleRangeChars(){ let out=[]; const g=grade();
  for(let li=S.range.from-1; li<=S.range.to-1; li++){ const cs=g.lessons[li].chars.slice(), n=Math.min(3,cs.length);
    for(let k=0;k<n;k++) out.push(cs.splice(Math.random()*cs.length|0,1)[0]); }
  return out; }
const elView=document.getElementById("view");
const wkey=()=>S.gi+"|"+S.li;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function spawnDebris(el){ // 破壞方塊：往上噴 + 左右大範圍散開 + 落下
  const r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<18;i++){
    const d=document.createElement("div"); d.className="debris";
    const sz=8+Math.random()*9; d.style.width=sz+"px"; d.style.height=sz+"px";
    d.style.left=cx+"px"; d.style.top=cy+"px";
    d.style.setProperty("--dx",((Math.random()*2-1)*180)+"px");  // 左右散開更大
    d.style.setProperty("--up",(-(90+Math.random()*90))+"px");   // 先往上噴
    d.style.setProperty("--down",((Math.random()*100)+80)+"px"); // 再落下
    document.body.appendChild(d); setTimeout(()=>d.remove(),820);
  }
}
// 生詞提示：取含該字的造詞，把目標字換成注音（其他字保留國字）
function hintWord(c){
  const w=(c.words||[]).find(x=>x.includes(c.char)) || c.char;
  return esc(w).split(c.char).join('<span class="zy">'+esc(c.zhuyin)+'</span>');
}

// ====== 遊戲化：等級 / XP / 成就 / 收集 / streak ======
// v48：前段門檻加密（配合「完成一關 +20XP」，前幾關幾乎每關升一級）
const LEVELS=[{xp:0,name:"生字見習生"},{xp:40,name:"生字學徒"},{xp:100,name:"生字小高手"},{xp:200,name:"生字達人"},{xp:340,name:"生字大師"},{xp:540,name:"生字宗師"},{xp:820,name:"生字大俠"},{xp:1200,name:"生字仙人"},{xp:1750,name:"生字龍王"},{xp:2500,name:"生字傳說"}];
function levelInfo(){ let i=0; for(let k=0;k<LEVELS.length;k++) if(store.xp>=LEVELS[k].xp) i=k;
  const cur=LEVELS[i], nx=LEVELS[i+1]; return {lv:i+1,name:cur.name,base:cur.xp,next:nx?nx.xp:null,isMax:!nx}; }
function addXP(n){ const b=levelInfo().lv; store.xp+=n; saveStore(); const a=levelInfo(); renderHUD();
  if(a.lv>b){ renderBuddy('idle'); showLevelUp(a); } }

function confetti(){ const cs=["#ffd83d","#6abe30","#3fd0e0","#e23b3b","#b87de0","#ff9a3d"];
  for(let i=0;i<44;i++){ const d=document.createElement("div"); d.className="confetti";
    d.style.left=(Math.random()*100)+"vw"; d.style.background=cs[i%cs.length];
    d.style.animationDuration=(1.5+Math.random()*1.6)+"s"; d.style.animationDelay=(Math.random()*0.3)+"s";
    document.body.appendChild(d); setTimeout(()=>d.remove(),3400); } }
// streak（每天首次學習）
function updateStreak(){ const today=new Date().toLocaleDateString('en-CA');
  if(store.lastDay!==today){ const y=new Date(Date.now()-864e5).toLocaleDateString('en-CA');
    store.streak=(store.lastDay===y)?store.streak+1:1;
    store.maxStreak=Math.max(store.maxStreak||0, store.streak);
    store.daysCount=(store.daysCount||0)+1; store.lastDay=today; saveStore();
    if(store.streak>=7) unlock("streak7");
  } else { store.maxStreak=Math.max(store.maxStreak||0, store.streak); }
  resetDaily(); }
// ── 每日任務 ──
const DAILY_DEFS=[
  {id:"seen",  target:10, ic:"📖", label:"看 10 個生字"},
  {id:"ok",    target:5,  ic:"✅", label:"答對 5 題"},
  {id:"lesson",target:1,  ic:"🚩", label:"完成 1 關（複習或抽考）"},
];
function resetDaily(){ const today=new Date().toLocaleDateString('en-CA');
  if(!store.daily || store.daily.date!==today){ store.daily={date:today, seen:0, ok:0, lesson:0, claimed:{}}; saveStore(); } }
function dailyProgress(id, n){ resetDaily(); const d=store.daily, def=DAILY_DEFS.find(x=>x.id===id); if(!def) return;
  d[id]=(d[id]||0)+(n||1);
  if(d[id]>=def.target && !d.claimed[id]){ d.claimed[id]=1; addCoins(10);
    sAchv(); toast("✅ 每日任務完成："+def.label+"　+10💰",""); }
  saveStore();
  if(DAILY_DEFS.every(x=>d.claimed[x.id]) && !d.claimed.all){ d.claimed.all=1; saveStore();
    setTimeout(()=>{ toast("🎁 今日任務全部完成！送你一顆蛋",""); showEgg("normal"); }, 900); }
  const dq=document.getElementById("dqbox"); if(dq) dq.outerHTML=dailyHTML();
}
function dailyHTML(){ resetDaily(); const d=store.daily;
  const rows=DAILY_DEFS.map(x=>{ const v=Math.min(d[x.id]||0, x.target), done=!!d.claimed[x.id];
    return `<div class="dqrow ${done?'done':''}"><span>${done?'✅':x.ic}</span><span style="flex:1">${x.label}</span>
      <span class="dqbar"><i style="width:${Math.round(v/x.target*100)}%"></i></span><span class="dqn">${v}/${x.target}</span></div>`; }).join("");
  const allDone=DAILY_DEFS.every(x=>d.claimed[x.id]);
  return `<div class="dq" id="dqbox"><div class="dqtitle">📋 今日任務${allDone?'（全部完成 🎉）':'（各 +10💰，全完成再送 🥚）'}</div>${rows}</div>`;
}
// 我的進度頁（第一波簡版；第三波再加弱點字/筆順）
function viewStats(){
  document.getElementById("crumb").textContent="我的進度";
  const li=levelInfo();
  // 生物圖鑑：開蛋孵出（v48 起不再綁課次/天數；×n 是重複孵到的數量＝之後的合成素材）
  const zooCells=HATCH_ALL.map(a=>{ const n=store.zoo[a.key]||0, sh=!!store.shiny[a.key];
    const isRare=RARE_EGG.some(r=>r.key===a.key), owned=n>0||sh;
    return `<div class="zoocell ${owned?'got':''} ${sh?'shinycell':''}">`+(owned
      ? '<div class="zoosvg">'+critterMarkup(a,isRare)+'</div><div class="zooname">'+a.name+(sh?' ✨':'')+(n>1?' ×'+n:'')+'</div>'
      : '<div class="zoolock">？</div><div class="zooname">'+(isRare?'金蛋限定':'開蛋獲得')+'</div>')+`</div>`; }).join("");
  const zooSec=`<div class="field full"><div class="lab">🐾 生物圖鑑 ‧ 已孵出 ${zooCount()} / ${HATCH_ALL.length}（完成關卡、抽考高分、每日任務都會得到蛋）<button class="btn btn-diamond" id="fuseShortcut" style="font-size:12px;padding:4px 10px;width:auto;margin-left:8px">🔨 合成台</button></div><div class="zoowall">${zooCells}</div></div>`;
  // 稀有生物：每個年級各自一段（依該 grade 的里程碑集）
  const rareSecs=DATA.grades.map((g,gi)=>{
    const cells=milestonesFor(gi).map(m=>{ const got=store.rares[m.key];
      return `<div class="zoocell ${got?'got':''}">`+(got?'<div class="zoosvg">'+m.svg()+'</div><div class="zooname">'+m.name+'</div>':'<div class="zoolock">？</div><div class="zooname">第'+m.from+'-'+m.to+'關全對</div>')+`</div>`; }).join("");
    return `<div class="field full"><div class="lab">✨ 稀有生物 ‧ ${esc(g.label||g.grade)}（範圍挑戰全對解鎖）</div><div class="zoowall">${cells}</div></div>`; }).join("");
  const acc= store.stats.quizTotal? Math.round(store.stats.quizOk/store.stats.quizTotal*100):0;
  const achvHTML=ACHV.map(a=>`<div class="achvrow ${store.achv[a.id]?'':'locked'}">
    <span class="ic">${a.ic}</span><div><div class="nm">${a.nm}</div><div class="ds">${a.ds}</div></div></div>`).join("");
  const weak=allWrong();
  const weakHTML= weak.length? weak.map(ch=>`<span class="wrongchip" data-ch="${esc(ch)}">${esc(ch)}</span>`).join("") : '<span style="color:#8a7c5a;font-weight:700">目前沒有弱點字，很棒！</span>';
  elView.innerHTML=`<div class="card block" style="text-align:left">
    <div style="text-align:center"><div class="levelup">Lv.${li.lv}　${esc(li.name)}</div>
      <div class="statline">${store.xp} XP ‧ ${store.coins}💰 ‧ 🔥連續 ${store.streak} 天 ‧ 看過 ${seenCount()} 字 ‧ 抽考正確率 ${acc}%</div></div>
    ${zooSec}
    ${rareSecs}
    <div class="field full"><div class="lab">📕 弱點字（抽考錯過的字，點唸音）</div><div style="margin-top:6px">${weakHTML}</div></div>
    <div class="field full"><div class="lab">🏅 成就</div>${achvHTML}</div>
    <div class="navrow"><button class="btn btn-diamond" id="reportBtn">📊 各課表現</button><button class="btn btn-stone" id="sback">◀ 返回</button></div></div>`;
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(zhuyinOf(x.dataset.ch)||x.dataset.ch);});
  const fs=document.getElementById("fuseShortcut"); if(fs) fs.onclick=()=>{sClick(); viewFusion();};
  document.getElementById("reportBtn").onclick=()=>{sClick(); viewReport();};
  document.getElementById("sback").onclick=()=>{sClick(); viewHome();};

// ====== 各課表現（老師診斷：每課正確率 + 不熟的字 + 不熟部首）======
function viewReport(){
  document.getElementById("crumb").textContent="各課表現";
  const g=grade();
  const rows=g.lessons.map((l,i)=>{ const k=S.gi+"|"+i, st=store.lessonStats[k];
    const acc= st&&st.total? Math.round(st.ok/st.total*100):null;
    const wrong=store.wrong[k]||[];
    const wchips=wrong.length? wrong.map(ch=>`<span class="wrongchip" data-ch="${esc(ch)}">${esc(ch)}</span>`).join("") : '<span style="color:#8a7c5a">—（全對或未考）</span>';
    const rads={}; wrong.forEach(ch=>{ const c=l.chars.find(x=>x.char===ch); if(c) rads[c.radical]=(rads[c.radical]||0)+1; });
    const radList=Object.keys(rads).length? Object.entries(rads).sort((a,b)=>b[1]-a[1]).map(e=>`<span class="tag">${esc(e[0])}部 ×${e[1]}</span>`).join("") : '<span style="color:#8a7c5a">—</span>';
    return `<div class="field full"><div class="lab">第${l.id}課 ${esc(l.title)} ‧ 正確率 ${acc===null?'尚未抽考':acc+'%'}</div>
      <div style="font-size:13px;margin-top:4px"><b>不熟的字</b>（點唸音）：${wchips}</div>
      <div class="tagrow" style="margin-top:4px"><b style="font-size:13px">不熟部首：</b>${radList}</div></div>`; }).join("");
  elView.innerHTML=`<div class="card block" style="text-align:left">
    <div class="q-prompt">📊 各課表現（老師診斷用）</div>${rows}
    <div class="navrow"><button class="btn btn-stone" id="rpBack">◀ 返回</button></div></div>`;
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(zhuyinOf(x.dataset.ch)||x.dataset.ch);});
  document.getElementById("rpBack").onclick=()=>{sClick(); viewStats();};
}

  if(type==="gold"){ const rares=RARE_EGG.filter(a=>!has(a));
    if(rares.length && Math.random()<0.3) return pick(rares); }
  const unowned=HATCH_NORMAL.filter(a=>!has(a));

  if(unowned.length && Math.random()<0.8) return pick(unowned);       // 普通蛋：8 成出新的

}

  if(!hanlinStrokesLoading){
    hanlinStrokesLoading=new Promise(res=>{ const s=document.createElement("script");
      s.src="data/strokes-hanlin.js"; s.onload=res; s.onerror=res; document.head.appendChild(s); });
  }
  return hanlinStrokesLoading;
}
function strokeData(c){ return (window.STROKES&&window.STROKES[c])||(window.STROKES_HANLIN&&window.STROKES_HANLIN[c])||null; }
function openStroke(char){
  const m=document.getElementById("strokeModal"), t=document.getElementById("strokeTarget");
  t.innerHTML=""; m.classList.add("show");
  const sp=1.5;
  const render=()=>{
    if(typeof HanziWriter==="undefined" || !strokeData(char)){
      t.innerHTML='<div style="padding:92px 8px;color:#8a7c5a;font-weight:700">此字暫無筆順資料</div>'; hw=null; return; }
    t.innerHTML="";
    hw=HanziWriter.create(t, char, { width:220, height:220, padding:8,
      charDataLoader:(c)=>strokeData(c), showOutline:true,
      strokeAnimationSpeed:sp, delayBetweenStrokes:Math.round(280/sp), strokeColor:"#1f3a5f", radicalColor:"#c0392b" });
    hw.animateCharacter();
  };
  if(window.STROKES&&window.STROKES[char]) render();
  else{
    t.innerHTML='<div style="padding:92px 8px;color:#8a7c5a;font-weight:700">筆順載入中…</div>';
    ensureHanlinStrokes().then(render);
  }
}

// 合成慶祝：三隻聚合 → 白光 → 閃亮版揭曉（合成台專用彈窗，不與蛋/解鎖彈窗互搶）
function showFusion(a){
  const m=document.getElementById("fuseModal"); if(!m){ sWin(); return; }
  const stage=document.getElementById("fuseStage"), name=document.getElementById("fuseName"),
        title=document.getElementById("fuseTitle"), close=document.getElementById("fuseModalClose");
  title.textContent="✨ 合成中…"; name.textContent="三隻"+a.name+"合體！"; close.style.display="none";
  stage.innerHTML=`<div class="conv c1">${a.svg()}</div><div class="conv c2">${a.svg()}</div><div class="conv c3">${a.svg()}</div><div class="flash" id="fuseFlash"></div>`;
  m.classList.add("show");
  [523,659,784,1046,1318].forEach((f,i)=>tone(f,.14,"square",.06,i*.09));  // 上升琶音
  setTimeout(()=>{ const fl=document.getElementById("fuseFlash"); if(fl) fl.classList.add("go"); sWin();
    setTimeout(()=>{ stage.innerHTML=shinyWrap(a.svg());
      title.textContent="✨ 閃亮版誕生！"; name.textContent="閃亮版 "+a.name+" ✨";
      close.style.display=""; setTimeout(sAchv,150); confetti(); }, 260);
  }, 900);
  close.onclick=()=>{ sClick(); m.classList.remove("show");
    renderHUD(); spawnCritters(); spawnBirds(); viewFusion(); };
}

// ====== 多音字工具 ======
// polyphone 格式：「詞 注音 ‧ 詞 注音」，拆成小卡；唸音取 / 前第一個詞
function polyTags(poly){
  return poly.split("‧").map(s=>s.trim()).filter(Boolean).map(seg=>{
    const i=seg.lastIndexOf(" ");
    const word=i>0?seg.slice(0,i).trim():seg, zh=i>0?seg.slice(i+1).trim():"";
    const sayw=word.split("/")[0];
    return `<span class="tag" data-say="${esc(sayw)}"><b>${esc(word)}</b> ${esc(zh)}</span>`;
  }).join("");
}

function viewLessons(){

  const cards=g.lessons.map((l,i)=>{

      <div class="meta">${l.chars.length} 字 ‧ 已複習 ${seen}/${l.chars.length} ‧ 正確率 ${acc}${(store.wrong[S.gi+"|"+i]||[]).length?(' ‧ 不熟 '+(store.wrong[S.gi+"|"+i]||[]).length+'字'):''}</div>

      <button class="btn btn-gold" id="rQuiz">📝 範圍抽考</button></div>
    <div class="field full" style="margin-top:12px"><div class="lab">🏆 里程碑（範圍抽考全對 → 解鎖稀有生物；點一下帶入範圍）</div>${ms}</div>
    <div class="navrow"><button class="btn btn-stone" id="rBack">◀ 返回</button></div></div>`;
  const setRange=(from,to)=>{ if(from>to){const t=from;from=to;to=t;} let chars=[];
    for(let li=from-1;li<=to-1;li++) chars=chars.concat(g.lessons[li].chars);
    S.range={from,to,chars,label:"第"+from+"-"+to+"課"}; };
  document.getElementById("rReview").onclick=()=>{ const f=+document.getElementById("rFrom").value,t=+document.getElementById("rTo").value; sClick(); setRange(f,t); S.mode="review"; S.ci=0; viewStudy(); };
  document.getElementById("rQuiz").onclick=()=>{ const f=+document.getElementById("rFrom").value,t=+document.getElementById("rTo").value; sClick(); setRange(f,t); S.mode="quiz"; viewStudy(); };
  elView.querySelectorAll(".msrow").forEach(r=>r.onclick=()=>{ document.getElementById("rFrom").value=r.dataset.from; document.getElementById("rTo").value=r.dataset.to; sClick(); });
  document.getElementById("rBack").onclick=()=>{sClick(); viewLessons();};
}

// ====== 學習頁（複習↔抽考共用）======
function viewStudy(){
  document.getElementById("crumb").textContent = S.range ? ("範圍 "+S.range.label) : (grade().label+" ‧ 第"+lesson().id+"關");
  elView.innerHTML=`
    <div style="margin-bottom:8px"><button class="btn btn-stone" id="backList" style="font-size:14px;padding:7px 14px;width:auto">◀ ${S.range?'返回範圍挑戰':'返回課程列表'}</button></div>
    <div class="modeswitch">
      <button class="btn btn-grass" id="mReview">📖 複習</button>
      <button class="btn btn-gold" id="mQuiz">📝 抽考</button>
    </div><div id="sub"></div>`;
  const setBtns=()=>{
    document.getElementById("mReview").classList.toggle("dim",S.mode!=="review");
    document.getElementById("mQuiz").classList.toggle("dim",S.mode!=="quiz");
  };
  document.getElementById("mReview").onclick=()=>{S.mode="review"; S.ci=0; sClick(); setBtns(); renderReview();};
  document.getElementById("mQuiz").onclick=()=>{S.mode="quiz"; sClick(); setBtns(); renderQuizSetup();};
  document.getElementById("backList").onclick=()=>{sClick(); (S.range?viewRange():viewLessons());};
  setBtns();
  if(S.mode==="review") renderReview(); else renderQuizSetup();

// ---- 複習 ----
function renderReview(){
  const chars=currentChars(), c=chars[S.ci];
  if(!S.range){ const sk=S.gi+"|"+S.li+"|"+c.char;
    if(!store.seen[sk]){ store.seen[sk]=1; saveStore(); addXP(2); flashHUD(); if(seenCount()>=100) unlock("see100"); }
    dailyProgress("seen"); }
  const madeIn='<span style="color:#a59a7a;font-weight:600">內容製作中</span>';
  const words=(c.words&&c.words.length)? c.words.map(w=>`<span class="tag" data-say="${esc(w)}">${esc(w)}</span>`).join("") : madeIn;
  const zhuyinHTML=c.zhuyin? esc(c.zhuyin) : '<span style="color:#a59a7a;font-weight:600">注音製作中</span>';
  const radHTML=c.radical? esc(c.radical) : "—";
  const strokeHTML=(c.strokes>0)? (c.strokes+" 畫") : "—";
  const sentHTML=c.sentence? esc(c.sentence) : madeIn;
  const _wrong = (!S.range)? (store.wrong[S.gi+"|"+S.li]||[]) : [];
  const wrongSec = _wrong.length? `<div class="field full"><div class="lab">📕 本課不熟的字（抽考答對就自動消失）</div><div class="tagrow" style="margin-top:4px">${_wrong.map(ch=>`<span class="wrongchip" data-ch="${esc(ch)}">${esc(ch)}</span>`).join("")}</div></div>` : "";
  const polySec = c.polyphone ? `<div class="field full"><div class="lab">🔤 多音字「${esc(c.char)}」（不同詞不同唸法，點詞唸音）</div><div class="tagrow">${polyTags(c.polyphone)}</div></div>` : "";
  const lp = (!S.range)? lessonPatterns() : null;
  const patSec = (lp&&lp.length)? `<details class="field full patbox"><summary style="cursor:pointer;font-weight:700;color:#1F3A5F;font-size:13px;list-style-position:inside;padding:2px 0">📝 本課句型（點開看照樣造句，至少 15 字）</summary>${lp.map(pt=>`<div style="margin-top:6px"><b style="color:#1F3A5F">${esc(pt.p)}</b><div class="val pex" data-ex="${esc(pt.ex)}" style="font-weight:600;cursor:pointer;margin:2px 0">🔊 ${esc(pt.ex)}</div><div style="font-size:13px;color:#666">換你造：${esc(pt.blank)}</div></div>`).join("")}</details>` : "";
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="charrow">
      <div><div class="char-big kai" id="bigChar">${esc(c.char)}</div><div class="spk">👆 點字唸給我聽</div>${c.recog?'<div class="recogbadge">🔖 認讀字（只要會認、不用會寫）</div>':''}
        <button class="btn btn-diamond" id="strokeBtn" style="font-size:14px;padding:6px 14px;margin-top:8px;width:auto">✍️ 看筆順</button></div>
      <div><div class="zhuyin">${zhuyinHTML}</div></div>
    </div>
    <div class="fields">
      <div class="field"><div class="lab">部首</div><div class="val kai">${radHTML}</div></div>
      <div class="field"><div class="lab">筆畫</div><div class="val">${strokeHTML}</div></div>
      <div class="field full"><div class="lab">造詞（點詞唸音）</div><div class="tagrow">${words}</div></div>
      <div class="field full"><div class="lab">造句（點句唸音 🔊）</div><div class="val" id="sentSay" style="font-weight:600;${c.sentence?' cursor:pointer':''}">${sentHTML}</div></div>
      ${polySec}
    </div>
    ${wrongSec}
    ${patSec}
    <div class="navrow">
      <button class="btn btn-stone" id="prev">◀ 上一個</button>
      <span class="counter">${S.ci+1} / ${chars.length}</span>
      <button class="btn btn-grass" id="next">下一個 ▶</button>
    </div>
    <div class="hint">綠色經驗條會記住你看過哪些字</div></div>`;
  document.getElementById("bigChar").onclick=()=>{sClick(); speak(charSay(c));};
  document.getElementById("strokeBtn").onclick=()=>{sClick(); openStroke(c.char);};
  if(c.sentence) document.getElementById("sentSay").onclick=()=>{sClick(); speak(c.sentence);};
  document.querySelectorAll(".tag").forEach(t=>t.onclick=()=>{sClick(); speak(t.dataset.say);});
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(zhuyinOf(x.dataset.ch)||x.dataset.ch);});
  document.querySelectorAll(".pex").forEach(x=>x.onclick=()=>{sClick(); speak(x.dataset.ex);});
  document.getElementById("prev").onclick=()=>{ if(S.ci>0){S.ci--; sClick(); renderReview();} };
  document.getElementById("next").onclick=()=>{
    if(S.ci<chars.length-1){S.ci++; sClick(); renderReview();}
    else if(S.range){ sWin(); viewRange(); }
    else renderReviewDone(chars);
  };
  speak(charSay(c));
}

// ---- 複習結算（每次看完整關都有回饋；蛋與大額 XP 只給首次完成）----
function renderReviewDone(chars){
  const k=wkey();
  if(chars.every(x=>store.seen[S.gi+"|"+S.li+"|"+x.char])) unlock("first_review");
  const first=!store.lessonDone[k];
  const gainXp=first?20:0, gainCoin=first?10:5;
  if(first){ store.lessonDone[k]=1; saveStore(); }
  const pre=levelInfo(), preXp=store.xp;
  const prePct=pre.isMax?100:Math.round((preXp-pre.base)/(pre.next-pre.base)*100);
  addCoins(gainCoin);
  if(gainXp){ store.xp+=gainXp; saveStore(); }   // 不走 addXP：升級慶祝等經驗條動畫跑完再跳
  const post=levelInfo(), lvup=post.lv>pre.lv;
  const postPct=post.isMax?100:Math.round((store.xp-post.base)/(post.next-post.base)*100);
  renderHUD();
  const eggSec = first
    ? `<div style="margin-top:12px"><div class="eggwrap" id="sumEgg">${eggSVG("normal",72)}<div class="egghint">🥚 首次完成獎勵：點蛋孵化！</div></div></div>`
    : `<div class="statline" style="margin-top:8px">再複習一遍 +${gainCoin}💰（首次完成的蛋已領過）</div>`;
  document.getElementById("sub").innerHTML=`<div class="card block"><div class="bigstat">
    <div class="levelup">🎉 完成！${esc(lesson().title)}</div>
    <div class="statline">這一關 ${chars.length} 個生字全部看完了！</div>
    <div class="statline" style="font-size:18px"><b style="color:var(--grass-d)" id="sumXp">+0 XP</b> ‧ <b style="color:#b8860b">+${gainCoin}💰</b></div>
    <div class="expbar" style="max-width:320px;margin:8px auto"><i id="sumBar" style="width:${lvup?0:prePct}%; transition:width .9s ease"></i></div>
    <div class="statline" id="sumLv">Lv.${post.lv} ${post.name}${post.isMax?"":"（"+store.xp+" / "+post.next+" XP）"}</div>
    ${eggSec}</div>
    <div class="navrow">
      <button class="btn btn-stone" id="rdBack">◀ 返回課程列表</button>
      <button class="btn btn-gold" id="rdQuiz">📝 挑戰抽考 ▶</button>
    </div></div>`;
  confetti(); sWin();
  const xpEl=document.getElementById("sumXp");
  if(gainXp){ let shown=0; const t=setInterval(()=>{ shown+=2;
      if(shown>=gainXp){ shown=gainXp; clearInterval(t); sOk(); }
      if(xpEl) xpEl.textContent="+"+shown+" XP"; }, 55); }
  setTimeout(()=>{ const b=document.getElementById("sumBar"); if(b) b.style.width=postPct+"%"; },200);
  if(lvup) setTimeout(()=>{ renderBuddy('idle'); showLevelUp(post); }, 1200);
  const egg=document.getElementById("sumEgg");
  if(egg) egg.onclick=()=>{ egg.style.pointerEvents="none"; egg.style.opacity=.45; showEgg("normal"); };
  document.getElementById("rdBack").onclick=()=>{sClick(); viewLessons();};
  document.getElementById("rdQuiz").onclick=()=>{S.mode="quiz"; sClick(); viewStudy();};
  dailyProgress("lesson");
}

// ---- 抽考設定 ----
const QTYPES=[
  {k:"word2char",t:"聽注音 → 寫字", show:c=>c.zhuyin, ans:c=>c.char, say:c=>c.char, only:c=>!!c.zhuyin},
  {k:"zhuyin", t:"看字 → 唸注音", show:c=>c.char, ans:c=>c.zhuyin, only:c=>!!c.zhuyin},
  {k:"radical",t:"看字 → 答部首", show:c=>c.char, ans:c=>c.radical+" 部", only:c=>!!c.radical},
  {k:"strokes",t:"看字 → 答筆畫", show:c=>c.char, ans:c=>c.strokes+" 畫", only:c=>c.strokes>0},
  {k:"makeword",t:"看字 → 造詞/造句（口頭）", show:c=>c.char, ans:c=>c.words.join("、")+"／"+c.sentence, only:c=>(c.words&&c.words.length>0)||!!c.sentence},
  {k:"poly",t:"多音字 → 唸對讀音", show:c=>c.char, ans:c=>c.polyphone, only:c=>!!c.polyphone},
];
function renderQuizSetup(){
  const l=lesson();
  const wrongList=store.wrong[wkey()]||[];
  const opts=QTYPES.map(q=>`<label class="opt"><input type="checkbox" class="qt" value="${q.k}" ${q.k==="word2char"?"checked":""}> ${q.t}</label>`).join("");
  document.getElementById("sub").innerHTML=`<div class="card block quizsetup">
    <div class="q-prompt">老師設定抽考（在電腦上操作，答案會蓋住）</div>
    ${opts}
    <label class="opt"><input type="checkbox" id="useHint" checked> 顯示生詞提示（例：ㄊㄢˋ險）</label>
    <label class="opt"><input type="checkbox" id="onlyWrong" ${wrongList.length?"":"disabled"}> 只考錯題本（目前 ${wrongList.length} 字）</label>
    <label class="opt"><input type="checkbox" id="doShuffle" checked> 隨機出題順序</label>
    <label class="opt" style="justify-content:space-between">📋 題數上限
      <select id="qLimit" style="font-size:16px;padding:4px 6px;font-weight:700;border-radius:6px">
        <option value="0">全部</option><option value="10">10 題</option><option value="20">20 題</option><option value="30">30 題</option>
      </select></label>
    <div class="navrow">
      <button class="btn btn-stone" id="back">◀ 返回</button>
      <button class="btn btn-gold" id="start">開始抽考 ▶</button>
    </div>
    <div class="hint">抽考時：點一下方塊就挖開答案，再點一下蓋回；老師按「答對／答錯」記分</div></div>`;
  document.getElementById("back").onclick=()=>{ if(S.range) viewRange(); else { S.mode="review"; viewStudy(); } };
  document.getElementById("start").onclick=()=>{
    const types=[...document.querySelectorAll(".qt:checked")].map(x=>x.value);
    if(!types.length){alert("請至少選一種題型");return;}
    let chars = S.range ? sampleRangeChars() : l.chars.slice();
    if(!S.range && document.getElementById("onlyWrong").checked){
      const w=store.wrong[wkey()]||[]; chars=chars.filter(c=>w.includes(c.char));
    }
    let queue=[];
    chars.forEach(c=>types.forEach(tk=>{ const q=QTYPES.find(q=>q.k===tk); if(q.only&&!q.only(c))return; if(c.recog&&q.k==="word2char")return; queue.push({c,q}); }));
    if(!queue.length){alert("這個範圍沒有可出的題目（生字內容可能還在製作中）");return;}
    if(document.getElementById("doShuffle").checked) queue=shuffle(queue);
    const lim=+document.getElementById("qLimit").value; if(lim>0) queue=queue.slice(0,lim);
    S.quiz={queue, idx:0, ok:0, no:0, hint:document.getElementById("useHint").checked};
    sPlace(); renderQuizCard();
  };
}

// ---- 抽考出題 ----
function renderQuizCard(){
  const Q=S.quiz;
  if(Q.idx>=Q.queue.length){ return renderQuizDone(); }
  const {c,q}=Q.queue[Q.idx];
  const showVal=q.show(c), ansVal=q.ans(c);
  const isChar=(q.k!=="word2char");
  const total=Q.queue.length, pct=Math.round(Q.idx/total*100);
  const hearts="❤️".repeat(Math.min(Q.ok,10))||"—";
  const hintHTML = (Q.hint && q.k!=="poly" && c.zhuyin) ? `<div class="hintword">📖 生詞：${hintWord(c)}</div>` : "";
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="hud">
      <span class="hearts">${hearts}</span>
      <span class="expbar"><i style="width:${pct}%"></i></span>
      <span class="hudtxt">第 ${Q.idx+1}/${total} ‧ ❌${Q.no}</span>
    </div>
    ${c.recog?'<div class="recogtag">🔖 認讀字：會唸出來就算對</div>':''}<div class="q-prompt">${esc(q.t)}</div>
    <div class="${isChar?'char-big kai':'zhuyin'}" id="qShow" style="cursor:pointer">${esc(showVal)}</div>
    <div class="spk">👆 點題目可唸音</div>
    ${hintHTML}
    <div style="margin-top:6px"><div class="cover-wrap">
      <div class="answer-box"><span class="${q.k==='word2char'?'char-big kai':(q.k==='poly'?'kai':'zhuyin')}" style="font-size:${(q.k==='makeword'||q.k==='poly')?'18px':''}">${esc(ansVal)}</span></div>
      <div class="cover" id="cover">⛏️ 點一下挖開答案<div class="crack" id="crack"></div></div>
    </div></div>
    <div class="judge">
      <button class="btn btn-green" id="ok">答對 ✓</button>
      <button class="btn btn-red" id="no">答錯 ✗</button>
    </div>
    <div class="navrow"><button class="btn btn-stone" id="stop">結束抽考</button></div>
    <div class="hint">點一下方塊挖開答案，再點一下蓋回（學生看不到）</div></div>`;
  const sayText=charSay(c);
  document.getElementById("qShow").onclick=()=>{sClick(); speak(sayText);};
  if(q.k==="word2char") speak(sayText);
  const cover=document.getElementById("cover"), crack=document.getElementById("crack");
  let broken=false;
  cover.addEventListener("click",()=>{
    if(broken){ // 再點一下：方塊重組蓋回
      broken=false; cover.classList.remove("breaking"); cover.style.display="flex"; crack.style.opacity=0;
    } else { // 點一下：破壞方塊 → 裂紋＋碎片飛散 → 露答案
      broken=true; sBreak(); crack.style.opacity=1; cover.classList.add("breaking"); spawnDebris(cover);
      setTimeout(()=>{ if(broken) cover.style.display="none"; }, 360);
    }
  });
  document.getElementById("ok").onclick=()=>{
    Q.ok++; Q.combo=(Q.combo||0)+1; store.stats.quizOk++; store.stats.quizTotal++;
    if(!S.range){ const lk=wkey(); store.lessonStats[lk]=store.lessonStats[lk]||{ok:0,total:0}; store.lessonStats[lk].ok++; store.lessonStats[lk].total++; }
    saveStore();
    sComboTone(Q.combo); if(Q.combo>=2) comboPop(Q.combo);
    addXP(5); addCoins(1); rewardPop("+5 XP　+1💰"); dailyProgress("ok");
    if(Q.combo>=10) unlock("combo10");
    buddyReact('happy'); if(!S.range) removeWrong(c.char); Q.idx++; renderQuizCard();
  };
  document.getElementById("no").onclick=()=>{
    Q.no++; Q.combo=0; store.stats.quizTotal++;
    if(!S.range){ const lk=wkey(); store.lessonStats[lk]=store.lessonStats[lk]||{ok:0,total:0}; store.lessonStats[lk].total++; }
    saveStore();
    sNo(); buddyReact('sad'); if(!S.range) addWrong(c.char); Q.idx++; renderQuizCard();
  };
  document.getElementById("stop").onclick=()=>renderQuizDone();
}
function addWrong(ch){ const k=wkey(); store.wrong[k]=store.wrong[k]||[]; if(!store.wrong[k].includes(ch))store.wrong[k].push(ch); saveStore(); }
function removeWrong(ch){ const k=wkey(); if(store.wrong[k]) store.wrong[k]=store.wrong[k].filter(x=>x!==ch); saveStore(); }

// ---- 抽考結算 ----
function renderQuizDone(){
  const Q=S.quiz, total=Q.ok+Q.no, pct=total?Math.round(Q.ok/total*100):0;
  sWin();
  if(total>0 && pct===100){
    if(S.range){ const m=milestoneOf(S.range.from,S.range.to);
      if(m && !store.rares[m.key]){ store.rares[m.key]=1; saveStore(); showUnlock(m); if(m.sky)spawnBirds(); else spawnCritters(); } }
    else { unlock("perfect"); collectGem(); }
  }
  // 結算金幣（按分數）＋蛋（80 分銀蛋、100 分金蛋；至少 5 題才有蛋，避免 1 題就領獎）
  let coinGain=0, eggType=null;
  if(total>0){ coinGain = pct===100?20:(pct>=80?15:(pct>=60?10:5)); addCoins(coinGain); dailyProgress("lesson"); }
  if(!S.range && total>=5 && pct>=80) eggType = pct===100?"gold":"silver";
  const eggSec = eggType
    ? `<div style="text-align:center;margin-top:6px"><div class="eggwrap" id="qdEgg">${eggSVG(eggType,72)}<div class="egghint">${pct===100?"🥇 滿分獎勵：金蛋（有機會孵出稀有動物）！":"🥈 高分獎勵：銀蛋！"}點蛋孵化</div></div></div>`
    : (!S.range && total>0 && total<5 ? `<div class="hint">（一次考 5 題以上，80 分就有蛋喔）</div>` : "");
  const medal = pct===100?"🏆 全部答對！":(pct>=80?"⭐ 闖關高手！":(pct>=60?"💪 再接再厲！":"🌱 多練習會更棒！"));
  let wrongSec="";
  if(!S.range){ const wlist=store.wrong[wkey()]||[], lc=lesson().chars;
    const chips=wlist.length? wlist.map(ch=>{const cc=lc.find(x=>x.char===ch); const sy=cc?charSay(cc):ch;
        return `<span class="wrongchip" data-ch="${esc(ch)}" data-say="${esc(sy)}">${esc(ch)}</span>`;}).join("")
                            : `<div class="empty">這關錯題本是空的，太棒了！🏆</div>`;
    wrongSec=`<div class="field full"><div class="lab">📕 本關錯題本（點字唸音）</div><div style="margin-top:6px">${chips}</div></div>`; }
  let rangeNote="";
  if(S.range){ const m=milestoneOf(S.range.from,S.range.to);
    rangeNote=`<div class="statline">範圍挑戰：${esc(S.range.label)}${m?(pct===100?(store.rares[m.key]?' ‧ 已解鎖 '+m.name:''):' ‧ 全對解鎖 '+m.name):''}</div>`; }
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="bigstat">
      <div class="levelup">${medal}</div>
      <div class="num">${pct}分</div>
      <div class="expbar" style="max-width:320px;margin:8px auto"><i style="width:${pct}%"></i></div>
      <div class="statline">答對 ${Q.ok} ‧ 答錯 ${Q.no}（共 ${total} 題）${coinGain?' ‧ <b style="color:#b8860b">+'+coinGain+'💰</b>':''}</div>${rangeNote}</div>
    ${eggSec}
    ${wrongSec}
    <div class="navrow">
      <button class="btn btn-gold" id="again">再考一次</button>
      <button class="btn btn-stone" id="back">${S.range?'返回範圍挑戰':'返回關卡'}</button>
    </div></div>`;
  const qdEgg=document.getElementById("qdEgg");
  if(qdEgg) qdEgg.onclick=()=>{ qdEgg.style.pointerEvents="none"; qdEgg.style.opacity=.45; showEgg(eggType); };
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(x.dataset.say||x.dataset.ch);});
  document.getElementById("again").onclick=()=>{sClick(); renderQuizSetup();};
  document.getElementById("back").onclick=()=>{sClick(); (S.range?viewRange():viewLessons());};
}

// 背景音樂：優先播放 audio/bgm.mp3（免版稅檔），載入失敗才退回合成鋼琴 loop；預設關
if(store.opt.bgm===undefined) store.opt.bgm=false;
const btnBgm=document.getElementById("btnBgm");
const bgm=document.getElementById("bgm"); bgm.volume=0.18;
let bgmTimer=null, bgmStep=0;
const BGM_SEQ=[392,440,523,440, 392,330,392,294, 330,392,440,523, 440,392,330,294];
function bgmNote(freq,dur,vol){ const a=ac(); if(!a)return;
  const o=a.createOscillator(), g=a.createGain(); o.type="triangle"; o.frequency.value=freq;
  const t=a.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur); }
function startSynth(){ if(bgmTimer||!ac()) return; bgmStep=0;
  const tick=()=>{ const f=BGM_SEQ[bgmStep%BGM_SEQ.length]; bgmNote(f,1.6,0.05);
    if(bgmStep%4===0) bgmNote(f/2,2.0,0.04); bgmStep++; };
  tick(); bgmTimer=setInterval(tick,720); }
function stopSynth(){ if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;} }
btnBgm.onclick=function(){
  store.opt.bgm=!store.opt.bgm; saveStore(); btnBgm.classList.toggle("on",store.opt.bgm);
  if(store.opt.bgm){ bgm.play().catch(()=>startSynth()); } else { bgm.pause(); stopSynth(); }
};

let swReg=null, swRefreshing=false;
function showUpdateBar(){ const b=document.getElementById("updatebar"); if(b) b.classList.add("show"); }
async function checkUpdate(){
  if(!("serviceWorker" in navigator)){ alert("這個瀏覽器不支援自動更新，重新整理一次即可。"); return; }
  const reg = swReg || await navigator.serviceWorker.getRegistration();
  if(!reg){ location.reload(); return; }
  // 主動抓線上最新 index.html（帶時間戳＋no-store，繞過瀏覽器與 SW 快取）比對真實版本
  let online=null;
  try{
    const r=await fetch("index.html?_="+Date.now(), {cache:"no-store"});
    const t=await r.text(); const m=t.match(/APP_VER\s*=\s*"([^"]+)"/); online=m?m[1]:null;
  }catch(e){}
  await reg.update();
  const hasNew = (online && online!==APP_VER) || !!reg.waiting || !!reg.installing;
  if(!hasNew){ alert("已經是最新版本了！🎉（目前 "+APP_VER+"）"); return; }
  showUpdateBar();
  if(reg.waiting){ reg.waiting.postMessage("skipWaiting"); return; }
  if(reg.installing){
    const nw=reg.installing;
    nw.addEventListener("statechange", ()=>{ if(nw.state==="installed" && reg.waiting) reg.waiting.postMessage("skipWaiting"); });
    return;
  }
  // 線上版本較新但 SW 未偵測到變化（罕見）：清掉所有快取硬更新
  if(online && online!==APP_VER){
    if(window.caches){ for(const k of await caches.keys()) await caches.delete(k); }
    location.reload();
  }
}
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js", {updateViaCache:"none"}).then(reg=>{
    swReg=reg; reg.update();
    // 打開 app 若已有等待中的新版 → 直接啟用（自動更新）
    if(reg.waiting && navigator.serviceWorker.controller) reg.waiting.postMessage("skipWaiting");
    reg.addEventListener("updatefound", ()=>{ const nw=reg.installing;
      nw && nw.addEventListener("statechange", ()=>{
        // 偵測到新版且是「更新」（非首次安裝）→ 自動套用，不需使用者點
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          (reg.waiting||nw).postMessage("skipWaiting");
        }
      });
    });
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener("controllerchange", ()=>{
    if(swRefreshing) return; swRefreshing=true; location.reload();
  });
  const un=document.getElementById("updNow");
  if(un) un.onclick=()=>{ if(swReg && swReg.waiting) swReg.waiting.postMessage("skipWaiting"); else location.reload(); };
}
</script>
