<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6abe30">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>生字大冒險</title>
<style>
:root{
  --sky1:#79c7ee; --sky2:#bfe9ff;
  --grass:#6abe30; --grass-d:#4a8a1f; --grass-l:#7ed149;
  --dirt:#9b6a43; --dirt-d:#6e4a2a;
  --stone:#9a9a9a; --stone-d:#6f6f6f;
  --wood:#bb8a52; --wood-d:#8a6238;
  --diamond:#3fd0e0; --diamond-d:#2a9fad;
  --gold:#ffd83d; --exp:#7ee03f; --exp-d:#4fa019;
  --red:#d24b3e; --green:#5aa83c; --heart:#e23b3b;
  --ink:#2b2118; --panel:#fffdf5; --panelline:#e6dcc4;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  font-family:'PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--sky1),var(--sky2) 55%, #cdeeb0 80%, #8fce5a 100%);
  background-attachment:fixed; min-height:100%;
  -webkit-user-select:none; user-select:none; overflow-x:hidden;
}
.kai{font-family:'BiauKai','標楷體','DFKai-SB',serif;}
/* 像素雲背景 */
.sky{position:fixed; inset:0; z-index:-2; overflow:hidden; pointer-events:none;}
.cloud{position:absolute; width:60px; height:18px; background:#fff; border-radius:3px;
  box-shadow: 22px -12px 0 0 #fff, 44px 0 0 0 #fff, 22px 0 0 8px #fff, -10px 0 0 0 #fff;
  opacity:.85; animation:drift linear infinite;}
@keyframes drift{ from{transform:translateX(-140px);} to{transform:translateX(110vw);} }
/* 地面草皮條（固定底部） */
.ground{position:fixed; left:0; right:0; bottom:0; height:46px; z-index:-1; pointer-events:none;
  background:repeating-linear-gradient(90deg,var(--grass) 0 24px,var(--grass-l) 24px 48px);
  box-shadow: inset 0 7px 0 var(--grass-l), inset 0 -30px 0 var(--dirt), inset 0 -46px 0 var(--dirt-d);}
.block{
  border:3px solid rgba(0,0,0,.25);
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.35), inset -3px -3px 0 rgba(0,0,0,.22), 4px 4px 0 rgba(0,0,0,.18);
  border-radius:4px;
}
.btn{
  cursor:pointer; border:none; font-family:inherit; font-weight:800; color:#fff;
  padding:12px 16px; font-size:18px; border-radius:6px; letter-spacing:1px;
  box-shadow: inset 3px 3px 0 rgba(255,255,255,.32), inset -4px -4px 0 rgba(0,0,0,.28), 3px 4px 0 rgba(0,0,0,.2);
  transition:transform .05s;
}
.btn:active{transform:translateY(2px); box-shadow: inset 3px 3px 0 rgba(255,255,255,.25), inset -3px -3px 0 rgba(0,0,0,.3);}
.btn-grass{background:var(--grass);} .btn-dirt{background:var(--dirt);}
.btn-stone{background:var(--stone);} .btn-wood{background:var(--wood);}
.btn-diamond{background:var(--diamond); color:#0a4a52;}
.btn-gold{background:var(--gold); color:#5a4500;}
.btn-red{background:var(--red);} .btn-green{background:var(--green);}
.wrap{max-width:980px; margin:0 auto; padding:14px; padding-bottom:60px;}
header.bar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:var(--dirt); color:#fff; padding:10px 14px; margin:-14px -14px 14px;
  box-shadow: inset 0 5px 0 var(--grass), inset 0 9px 0 var(--grass-l), inset 0 -4px 0 var(--dirt-d);
}
header.bar h1{font-size:20px; margin:0; letter-spacing:2px; text-shadow:2px 2px 0 rgba(0,0,0,.3);}
header.bar .sp{flex:1;}
.pill{background:rgba(0,0,0,.18); padding:5px 10px; border-radius:20px; font-size:13px; font-weight:700;}
.iconbtn{background:rgba(0,0,0,.18); border:none; color:#fff; cursor:pointer; font-size:18px; padding:6px 10px; border-radius:6px;}
.iconbtn.on{background:var(--gold); color:#5a4500;}

.hero{text-align:center; padding:24px 10px;}
.hero .logo{font-size:46px; font-weight:900; letter-spacing:4px; color:#fff;
  text-shadow:3px 3px 0 var(--dirt-d), 0 0 2px #000; margin-bottom:6px;}
.hero .torch{font-size:30px; margin:0 8px; filter:drop-shadow(0 0 6px #ffb53d);}
.hero .sub{color:#2f5320; font-weight:800; margin-bottom:20px; background:rgba(255,255,255,.55);
  display:inline-block; padding:5px 14px; border-radius:20px;}
.grade-grid{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
.grade-card{width:160px; padding:18px; background:var(--grass); color:#fff; text-align:center; cursor:pointer;}
.grade-card .t{font-size:24px; font-weight:900; text-shadow:2px 2px 0 var(--grass-d);}
.grade-card .d{font-size:13px; opacity:.9; margin-top:6px;}
.grade-card.locked{background:var(--stone); cursor:not-allowed; opacity:.85;}

.lesson-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px;}
.lesson-card{padding:14px; background:var(--wood); color:#fff; cursor:pointer; position:relative;}
.lesson-card .no{font-size:12px; opacity:.85;}
.lesson-card .nm{font-size:19px; font-weight:900; margin-top:4px; text-shadow:1px 1px 0 var(--wood-d);}
.lesson-card .meta{font-size:12px; margin-top:8px; opacity:.9;}
.lesson-card .bar2{height:9px; background:rgba(0,0,0,.28); border-radius:5px; margin-top:6px; overflow:hidden;
  box-shadow: inset 0 2px 2px rgba(0,0,0,.3);}
.lesson-card .bar2 i{display:block; height:100%; background:var(--exp); box-shadow:0 0 6px var(--exp);}

.modeswitch{display:flex; gap:8px; margin-bottom:12px;}
.modeswitch .btn{flex:1; font-size:16px;}
.modeswitch .btn.dim{filter:grayscale(.55) brightness(.9);}

.card{background:var(--panel); padding:20px; text-align:center; position:relative;}
.card::before{content:""; position:absolute; inset:0; border-radius:4px; pointer-events:none;
  background:linear-gradient(180deg, rgba(255,255,255,.5), transparent 8px);}
.charrow{display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;}
.char-big{font-size:96px; line-height:1.1; cursor:pointer; color:var(--ink); text-shadow:2px 2px 0 #d8cdb0;}
.char-big:active{transform:scale(.96);}
.zhuyin{font-size:30px; color:var(--red); font-weight:700; letter-spacing:1px;}
.spk{font-size:13px; color:var(--diamond-d); font-weight:700; margin-top:4px;}
.fields{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
.field{background:#fff; border:2px solid var(--panelline); border-radius:6px; padding:10px; text-align:left;}
.field .lab{font-size:12px; color:#9a8c6a; font-weight:700;}
.field .val{font-size:18px; font-weight:700; margin-top:2px;}
.field.full{grid-column:1/3;}
.tagrow{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px;}
.tag{background:var(--sky2); color:#1b5566; padding:3px 9px; border-radius:14px; font-size:15px; cursor:pointer; font-weight:700;}
details.adv{margin-top:12px; background:#f3eeda; border-radius:6px; padding:8px 12px; text-align:left;}
details.adv summary{cursor:pointer; font-weight:800; color:var(--dirt-d);}
details.adv .ac{margin-top:8px; font-size:15px; line-height:1.6;}
.navrow{display:flex; align-items:center; gap:10px; margin-top:16px;}
.navrow .btn{flex:1;}
.counter{font-weight:800; color:var(--dirt-d); min-width:70px; text-align:center;}

/* 抽考 */
.quizsetup .opt{display:flex; align-items:center; gap:8px; background:#fff; border:2px solid var(--panelline);
  padding:10px; border-radius:6px; margin-bottom:8px; cursor:pointer; font-weight:700;}
.quizsetup .opt input{width:20px; height:20px;}
.q-prompt{font-size:18px; color:var(--dirt-d); font-weight:800; margin-bottom:10px;}
/* 經驗條 + 愛心 HUD */
.hud{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;}
.hearts{font-size:18px; letter-spacing:1px;}
.expbar{flex:1; min-width:120px; height:16px; background:#3a3a3a; border-radius:4px; overflow:hidden;
  box-shadow: inset 0 2px 3px rgba(0,0,0,.5); border:2px solid #222;}
.expbar i{display:block; height:100%; background:repeating-linear-gradient(90deg,var(--exp) 0 8px,var(--exp-d) 8px 10px);
  transition:width .2s;}
.hudtxt{font-weight:800; color:var(--dirt-d); font-size:14px;}
/* 生詞提示 */
.hintword{display:inline-block; background:#fff7d6; border:2px dashed var(--gold); color:#6a5200;
  padding:8px 16px; border-radius:8px; font-size:24px; font-weight:800; margin:8px 0;}
.hintword .zy{color:var(--red);}
.cover-wrap{position:relative; display:inline-block; margin:6px auto;}
.answer-box{background:#fff; border:2px dashed var(--diamond-d); border-radius:8px; padding:18px 26px; min-width:200px;}
.cover{position:absolute; inset:0; border-radius:8px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:15px; cursor:pointer;
  background:#8b5a2b; background-image:
    linear-gradient(335deg, rgba(0,0,0,.18) 23px, transparent 23px),
    linear-gradient(155deg, rgba(0,0,0,.18) 23px, transparent 23px),
    repeating-linear-gradient(0deg,#9b6a43 0 14px,#8a5d39 14px 28px),
    repeating-linear-gradient(90deg,#9b6a43 0 14px,#8a5d39 14px 28px);
  box-shadow: inset 4px 4px 0 rgba(255,255,255,.18), inset -4px -4px 0 rgba(0,0,0,.32);}
.peek{position:absolute; top:-10px; right:-10px; width:48px; height:48px; border-radius:8px;
  background:var(--gold); color:#5a4500; border:3px solid #fff; cursor:pointer; font-size:22px; font-weight:900;
  display:flex; align-items:center; justify-content:center; box-shadow:2px 2px 0 rgba(0,0,0,.3); touch-action:none;}
.crack{position:absolute; inset:0; opacity:0; pointer-events:none; border-radius:8px; transition:opacity .04s;
  background:
    linear-gradient(48deg, transparent 47%, rgba(0,0,0,.6) 48% 50%, transparent 51%),
    linear-gradient(-28deg, transparent 58%, rgba(0,0,0,.55) 59% 61%, transparent 62%),
    linear-gradient(75deg, transparent 38%, rgba(0,0,0,.5) 39% 41%, transparent 42%),
    linear-gradient(-65deg, transparent 68%, rgba(0,0,0,.45) 69% 71%, transparent 72%);}
.cover.breaking{animation:blockbreak .38s ease-in forwards; pointer-events:none;}
@keyframes blockbreak{0%{transform:scale(1);}30%{transform:scale(1.05) translateY(-3px);}100%{transform:scale(.55) translateY(10px) rotate(4deg); opacity:0;}}
.debris{position:fixed; width:12px; height:12px; background:#8a5d39; border:2px solid #6e4a2a; z-index:60; pointer-events:none; animation:fly .8s ease-out forwards;}
@keyframes fly{
  0%{transform:translate(0,0) rotate(0); opacity:1;}
  35%{transform:translate(calc(var(--dx) * .55), var(--up)) rotate(150deg); opacity:1;}
  100%{transform:translate(var(--dx), var(--down)) rotate(400deg); opacity:0;}
}
.judge{display:flex; gap:10px; margin-top:16px;}
.judge .btn{flex:1; font-size:20px;}
.statline{font-weight:800; color:var(--dirt-d); margin:8px 0;}
.bigstat{text-align:center; padding:14px;}
.levelup{font-size:22px; font-weight:900; color:var(--gold); text-shadow:2px 2px 0 var(--dirt-d); letter-spacing:2px;
  animation:pop .5s ease;}
@keyframes pop{0%{transform:scale(.4); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
.bigstat .num{font-size:52px; font-weight:900; color:var(--grass-d);}
.wrongchip{display:inline-block; background:#ffe1dc; color:var(--red); padding:6px 12px; border-radius:16px;
  margin:4px; font-size:22px; font-weight:800; cursor:pointer; font-family:'BiauKai',serif;}
.hint{font-size:13px; color:#8a7c5a; text-align:center; margin-top:8px;}
.empty{text-align:center; color:#8a7c5a; padding:30px; font-weight:700;}
/* ── 遊戲化 ── */
.topxp{display:flex; align-items:center; gap:8px; background:rgba(0,0,0,.16); border-radius:8px; padding:6px 10px; margin-bottom:12px; cursor:pointer; flex-wrap:wrap;}
.topxp .lv{background:var(--gold); color:#5a4500; font-weight:900; padding:2px 8px; border-radius:6px; font-size:13px; white-space:nowrap;}
.topxp .xpbar{flex:1; min-width:80px; height:12px; background:#3a3a3a; border-radius:3px; overflow:hidden; border:2px solid #222;}
.topxp .xpbar i{display:block; height:100%; background:repeating-linear-gradient(90deg,var(--exp) 0 6px,var(--exp-d) 6px 8px); transition:width .3s;}
.topxp .mini{font-weight:800; color:var(--ink); font-size:13px; white-space:nowrap;}
.toast{position:fixed; top:14px; right:-380px; max-width:320px; background:#2b2118; color:#fff; border:3px solid var(--gold);
  border-radius:8px; padding:12px 16px; font-weight:800; z-index:200; box-shadow:4px 4px 0 rgba(0,0,0,.3);
  transition:right .4s cubic-bezier(.2,1.2,.4,1);}
.toast.show{right:14px;}
.toast.level{border-color:var(--exp);} .toast.gem{border-color:var(--diamond);}
.combopop{position:fixed; left:50%; top:38%; z-index:150; pointer-events:none; font-size:38px; font-weight:900;
  color:var(--gold); text-shadow:3px 3px 0 var(--dirt-d), 0 0 8px #ffb53d; opacity:0; animation:combopop .75s ease forwards;}
@keyframes combopop{0%{transform:translate(-50%,-50%) scale(.4); opacity:0;} 35%{transform:translate(-50%,-50%) scale(1.25); opacity:1;} 100%{transform:translate(-50%,-95%) scale(1); opacity:0;}}
.gemwall{display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin:8px 0;}
.gem{aspect-ratio:1; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:22px;
  background:#cfc4a8; color:#fff; box-shadow: inset 2px 2px 0 rgba(255,255,255,.3), inset -2px -2px 0 rgba(0,0,0,.2);}
.gem.got{background:linear-gradient(135deg,var(--diamond),var(--diamond-d));}
.achvrow{display:flex; align-items:center; gap:10px; background:#fff; border:2px solid var(--panelline); border-radius:6px; padding:8px 10px; margin-bottom:6px;}
.achvrow.locked{opacity:.45; filter:grayscale(1);}
.achvrow .ic{font-size:24px;} .achvrow .nm{font-weight:800;} .achvrow .ds{font-size:12px; color:#8a7c5a;}
.zoowall{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:8px 0;}
.zoocell{background:#efe7d2; border-radius:8px; padding:6px 4px; text-align:center; min-height:62px; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.zoocell.got{background:#dff0c8;}
.zoocell .zoosvg{height:32px; display:flex; align-items:flex-end; justify-content:center;}
.zoocell .zoosvg svg{height:32px; width:auto;}
.zoowall svg{animation:none !important;} .zoowall svg *{animation:none !important;}
.zoocell .zooname{font-size:11px; color:#5a4a2a; margin-top:3px; font-weight:700; line-height:1.2;}
.zoocell .zoolock{font-size:22px; color:#b8ac90; height:32px; display:flex; align-items:center;}
.zoocell:not(.got) .zooname{color:#a59a7a;}
/* ── 第二波：視覺沈浸 ── */
#loading{position:fixed; inset:0; z-index:500; background:linear-gradient(180deg,#16213e,#0f3320);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; transition:opacity .5s;}
#loading.hide{opacity:0; pointer-events:none;}
#loading .lblock{width:54px; height:54px; background:linear-gradient(135deg,var(--grass),var(--grass-d));
  box-shadow: inset 4px 4px 0 rgba(255,255,255,.3), inset -4px -4px 0 rgba(0,0,0,.3); border-radius:6px; animation:lspin 1.2s ease-in-out infinite;}
@keyframes lspin{0%,100%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.15);}}
#loading .ltxt{color:#fff; font-size:26px; font-weight:900; letter-spacing:2px; text-shadow:2px 2px 0 #000;}
#loading .lhint{color:#9fe6b0; font-size:14px; font-weight:700;}
.critters{position:fixed; left:0; right:0; bottom:5px; height:40px; z-index:0; pointer-events:none; overflow:hidden;}
.critter{position:absolute; bottom:0; left:-50px; animation:walk linear infinite;}
@keyframes walk{ from{transform:translateX(-50px);} to{transform:translateX(102vw);} }
.critter .hop{display:block; animation:hop 3.2s ease-in-out infinite;}
@keyframes hop{0%,80%,100%{transform:translateY(0);} 86%{transform:translateY(-9px);} 92%{transform:translateY(0);} 96%{transform:translateY(-4px);}}
.birds{position:fixed; left:0; right:0; top:0; height:48%; z-index:-1; pointer-events:none; overflow:hidden;}
.bird{position:absolute; left:-60px; animation:birdfly linear infinite;}
@keyframes birdfly{ from{transform:translateX(-60px);} to{transform:translateX(105vw);} }
.bird svg{display:block; animation:flap .32s ease-in-out infinite;}
@keyframes flap{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}
#buddy{position:fixed; left:0; bottom:6px; z-index:5; pointer-events:none; animation:bwalk 22s linear infinite;}
@keyframes bwalk{0%{transform:translateX(2vw);}48%{transform:translateX(82vw);}50%{transform:translateX(82vw) scaleX(-1);}98%{transform:translateX(2vw) scaleX(-1);}100%{transform:translateX(2vw);}}
#buddy svg{animation:bstep .42s ease-in-out infinite;}
@keyframes bstep{0%,100%{transform:translateY(0) rotate(-2.5deg);}50%{transform:translateY(-3px) rotate(2.5deg);}}
#buddy svg.react-happy{animation:rhappy .5s ease 3;}
@keyframes rhappy{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-10px) scale(1.12);}}
#buddy svg.react-sad{animation:rsad .4s ease 3;}
@keyframes rsad{0%,100%{transform:translateX(0) rotate(0);}25%{transform:translateX(-4px) rotate(-6deg);}75%{transform:translateX(4px) rotate(6deg);}}
.torch2{display:inline-block; width:8px; height:22px; background:var(--wood); position:relative; vertical-align:middle; border-radius:2px; margin:0 10px;}
.torch2::before{content:""; position:absolute; top:-11px; left:-4px; width:16px; height:17px;
  background:radial-gradient(circle at 50% 70%, #fff3b0, #ffb53d 45%, #ff6a00 78%, transparent 85%);
  border-radius:50% 50% 45% 45%/60% 60% 40% 40%; animation:flame .25s ease-in-out infinite alternate;}
@keyframes flame{from{transform:scaleY(1) scaleX(1); opacity:.88;}to{transform:scaleY(1.18) scaleX(.88); opacity:1;}}
/* 筆順 modal */
.smodal{position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center;}
.smodal.show{display:flex;}
.sbox{background:var(--panel); border-radius:10px; padding:18px; text-align:center; box-shadow:6px 6px 0 rgba(0,0,0,.3);}
.schar{width:220px; height:220px; margin:0 auto; background:#fff; border:2px solid var(--diamond-d); border-radius:8px;
  background-image:linear-gradient(var(--panelline) 1px,transparent 1px),linear-gradient(90deg,var(--panelline) 1px,transparent 1px); background-size:50% 50%, 50% 50%;}
.srow{display:flex; gap:10px; margin-top:12px;} .srow .btn{flex:1;}
/* 解鎖慶祝彈窗 */
.umodal{position:fixed; inset:0; z-index:400; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; overflow:hidden;}
.umodal.show{display:flex;}
.ubox{background:var(--panel); border:4px solid var(--gold); border-radius:14px; padding:24px 30px; text-align:center;
  box-shadow:0 0 0 6px rgba(255,216,61,.35), 8px 8px 0 rgba(0,0,0,.3); animation:upop .5s cubic-bezier(.2,1.4,.4,1);}
@keyframes upop{0%{transform:scale(.3) rotate(-8deg); opacity:0;} 100%{transform:scale(1) rotate(0); opacity:1;}}
.utitle{font-size:26px; font-weight:900; color:#e6a700; text-shadow:2px 2px 0 var(--dirt-d); letter-spacing:2px;}
.uanimal{margin:16px auto 8px; animation:ubounce 1s ease infinite; background:#eaf3da; border-radius:12px; padding:10px 22px; display:inline-block; box-shadow:inset 0 0 0 2px #d4e4bc;}
.uanimal svg{width:120px; height:auto; animation:none;}
@keyframes ubounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.uname{font-size:24px; font-weight:900; color:var(--ink); margin-bottom:16px;}
.confetti{position:fixed; top:-20px; width:12px; height:12px; z-index:401; pointer-events:none; animation:confall linear forwards;}
@keyframes confall{0%{transform:translateY(-20px) rotate(0); opacity:1;} 100%{transform:translateY(106vh) rotate(720deg); opacity:.9;}}
</style>
</head>
<body>
<div id="loading"><div class="lblock"></div><div class="ltxt">🗺️ 生字大冒險</div><div class="lhint">載入中… ⛏️</div></div>
<div class="sky" id="sky"></div>
<div class="ground"></div>
<div class="birds" id="birds"></div>
<div class="critters" id="critters"></div>
<div id="buddy"></div>
<div id="strokeModal" class="smodal"><div class="sbox">
  <div class="schar" id="strokeTarget"></div>
  <div class="srow"><button class="btn btn-grass" id="strokeReplay">▶ 重播</button><button class="btn btn-stone" id="strokeClose">關閉</button></div>
</div></div>
<div id="unlockModal" class="umodal"><div class="ubox">
  <div class="utitle">🎉 解鎖新夥伴！</div>
  <div class="uanimal" id="unlockAnimal"></div>
  <div class="uname" id="unlockName"></div>

// ====== 語音 ======
let zhVoice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices(); if(!vs.length) return null;
  const pref=["Meijia","美佳","Sinji","善怡","Shelley","Sandy","Yu-shu","Mei-Jia"];
  let v=vs.find(x=>/zh-TW|zh_TW/i.test(x.lang)&&pref.some(p=>x.name.includes(p)));
  v=v||vs.find(x=>/zh-TW|zh_TW/i.test(x.lang))||vs.find(x=>/zh|Chinese/i.test(x.lang));
  return v;
}
function getVoice(){ if(!zhVoice) zhVoice=pickVoice(); return zhVoice; }
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=()=>{zhVoice=pickVoice();}; }
function speak(text){
  if(!store.opt.voice || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=getVoice(); u.lang="zh-TW"; if(v){u.voice=v; u.lang=v.lang;}
  u.rate=0.8; u.pitch=1; speechSynthesis.speak(u);
}

// ====== Minecraft 風音效（Web Audio 合成）======
let actx=null;
function ac(){ if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}} if(actx&&actx.state==="suspended")actx.resume(); return actx; }
function tone(freq,dur,type,vol,when){
  if(!store.opt.sound) return; const a=ac(); if(!a)return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||"square"; o.frequency.value=freq;
  const t=a.currentTime+(when||0); g.gain.setValueAtTime(vol||0.06,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur);
}
function noise(dur,vol,when){
  if(!store.opt.sound) return; const a=ac(); if(!a)return;
  const n=Math.floor(a.sampleRate*dur), buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const src=a.createBufferSource(); src.buffer=buf;
  const g=a.createGain(); g.gain.value=vol||0.05; const t=a.currentTime+(when||0);
  const lp=a.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=800;
  src.connect(lp); lp.connect(g); g.connect(a.destination); src.start(t);
}
const sPlace=()=>{ tone(160,.05,"square",.06); noise(.05,.04); };          // 放方塊
const sClick=()=>{ tone(330,.04,"square",.05); };                          // 點擊

const sDig =()=>{ for(let i=0;i<3;i++){ noise(.05,.05,i*.06); tone(90+i*15,.05,"square",.04,i*.06);} }; // 挖掘
const sWin =()=>{ [523,659,784,1046,1318].forEach((f,i)=>tone(f,.14,"square",.06,i*.10)); };          // 升級
const sBreak=()=>{ tone(130,.12,"square",.09); tone(70,.16,"sawtooth",.06,.02); noise(.2,.10); setTimeout(()=>{noise(.08,.05);},70); }; // 破壞方塊

const sComboTone=(n)=>{ const b=520+Math.min(n,14)*38; tone(b,.10,"square",.06); tone(b*1.5,.08,"sine",.04,.04); }; // 連擊漸高
const sGem=()=>{ [1047,1319,1568,2093].forEach((f,i)=>tone(f,.10,"sine",.05,i*.05)); };       // 撿礦石

function esc(s){return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function spawnDebris(el){ // 破壞方塊：往上噴 + 左右大範圍散開 + 落下

}

function toast(text,kind){ const t=document.createElement("div"); t.className="toast "+(kind||"");

function confetti(){ const cs=["#ffd83d","#6abe30","#3fd0e0","#e23b3b","#b87de0","#ff9a3d"];

    document.body.appendChild(d); setTimeout(()=>d.remove(),3400); } }
// streak（每天首次學習）
function updateStreak(){ const today=new Date().toLocaleDateString('en-CA');
  if(store.lastDay!==today){ const y=new Date(Date.now()-864e5).toLocaleDateString('en-CA');
    const before=birdsUnlocked();
    store.streak=(store.lastDay===y)?store.streak+1:1;
    store.maxStreak=Math.max(store.maxStreak||0, store.streak); store.lastDay=today; saveStore();
    if(store.streak>=7) unlock("streak7");
    if(birdsUnlocked()>before){ const b=BIRDS[birdsUnlocked()-1]; if(b) setTimeout(()=>showUnlock(b),1400); }
  } else { store.maxStreak=Math.max(store.maxStreak||0, store.streak); } }

function viewStats(){

    <div class="field full"><div class="lab">🏅 成就</div>${achvHTML}</div>
    <div class="navrow"><button class="btn btn-stone" id="sback">◀ 返回</button></div></div>`;
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(x.dataset.ch);});
  document.getElementById("sback").onclick=()=>{sClick(); viewHome();};
}

function openStroke(char){
  const m=document.getElementById("strokeModal"), t=document.getElementById("strokeTarget");
  t.innerHTML=""; m.classList.add("show");
  if(typeof HanziWriter==="undefined" || !(window.STROKES&&window.STROKES[char])){

}

// ====== 課次地圖 ======
function viewLessons(){
  const g=grade();
  document.getElementById("crumb").textContent=g.label;
  const cards=g.lessons.map((l,i)=>{
    const seen=l.chars.filter(c=>store.seen[S.gi+"|"+i+"|"+c.char]).length;
    const pct=Math.round(seen/l.chars.length*100);
    const done=pct===100?" ✅":"";
    return `<div class="lesson-card block" data-li="${i}">
      <div class="no">第 ${l.id} 關${done}</div><div class="nm">${esc(l.title)}</div>
      <div class="meta">${l.chars.length} 字 ‧ 已複習 ${seen}/${l.chars.length}</div>
      <div class="bar2"><i style="width:${pct}%"></i></div></div>`;
  }).join("");
  elView.innerHTML=`<div class="lesson-grid">${cards}</div>`;
  elView.querySelectorAll(".lesson-card").forEach(c=>c.onclick=()=>{S.li=+c.dataset.li; S.ci=0; S.mode="review"; sPlace(); viewStudy();});
}

  const l=lesson(), c=l.chars[S.ci];

  if(!store.seen[sk]){ store.seen[sk]=1; saveStore(); addXP(2); if(seenCount()>=100) unlock("see100"); }
  const words=c.words.map(w=>`<span class="tag" data-say="${esc(w)}">${esc(w)}</span>`).join("");
  // 進階補充（成語/詞義/破音）暫時取消，等自修版照片再以那版做
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="charrow">
      <div><div class="char-big kai" id="bigChar">${esc(c.char)}</div><div class="spk">👆 點字念給我聽</div>
        <button class="btn btn-diamond" id="strokeBtn" style="font-size:14px;padding:6px 14px;margin-top:8px;width:auto">✍️ 看筆順</button></div>
      <div><div class="zhuyin">${esc(c.zhuyin)}</div></div>
    </div>
    <div class="fields">
      <div class="field"><div class="lab">部首</div><div class="val kai">${esc(c.radical)}</div></div>
      <div class="field"><div class="lab">筆畫</div><div class="val">${c.strokes} 畫</div></div>
      <div class="field full"><div class="lab">造詞（點詞念音）</div><div class="tagrow">${words}</div></div>
      <div class="field full"><div class="lab">造句（點句念音 🔊）</div><div class="val" id="sentSay" style="font-weight:600; cursor:pointer">${esc(c.sentence)}</div></div>
    </div>
    <div class="navrow">
      <button class="btn btn-stone" id="prev">◀ 上一個</button>
      <span class="counter">${S.ci+1} / ${l.chars.length}</span>
      <button class="btn btn-grass" id="next">下一個 ▶</button>
    </div>
    <div class="hint">綠色經驗條會記住你看過哪些字</div></div>`;
  document.getElementById("bigChar").onclick=()=>{sClick(); speak(c.say||c.char);};
  document.getElementById("strokeBtn").onclick=()=>{sClick(); openStroke(c.char);};
  document.getElementById("sentSay").onclick=()=>{sClick(); speak(c.sentence);};
  document.querySelectorAll(".tag").forEach(t=>t.onclick=()=>{sClick(); speak(t.dataset.say);});
  document.getElementById("prev").onclick=()=>{ if(S.ci>0){S.ci--; sClick(); renderReview();} };
  document.getElementById("next").onclick=()=>{
    if(S.ci<l.chars.length-1){S.ci++; sClick(); renderReview();}
    else{ // 看完整課
      if(l.chars.every(x=>store.seen[S.gi+"|"+S.li+"|"+x.char])) unlock("first_review");
      sWin(); viewLessons(); }
  };
  speak(c.say||c.char);
}

// ---- 抽考設定 ----
const QTYPES=[
  {k:"word2char",t:"聽注音 → 寫字", show:c=>c.zhuyin, ans:c=>c.char, say:c=>c.char},
  {k:"zhuyin", t:"看字 → 念注音", show:c=>c.char, ans:c=>c.zhuyin},
  {k:"radical",t:"看字 → 答部首", show:c=>c.char, ans:c=>c.radical+" 部"},
  {k:"strokes",t:"看字 → 答筆畫", show:c=>c.char, ans:c=>c.strokes+" 畫"},
  {k:"makeword",t:"看字 → 造詞/造句（口頭）", show:c=>c.char, ans:c=>c.words.join("、")+"／"+c.sentence},
];
function renderQuizSetup(){
  const l=lesson();
  const wrongList=store.wrong[wkey()]||[];
  const opts=QTYPES.map(q=>`<label class="opt"><input type="checkbox" class="qt" value="${q.k}" ${q.k==="word2char"?"checked":""}> ${q.t}</label>`).join("");
  document.getElementById("sub").innerHTML=`<div class="card block quizsetup">
    <div class="q-prompt">老師設定抽考（在電腦上操作，答案會蓋住）</div>
    ${opts}
    <label class="opt"><input type="checkbox" id="useHint" checked> 顯示生詞提示（例：ㄊㄢˋ險）</label>
    <label class="opt"><input type="checkbox" id="onlyWrong" ${wrongList.length?"":"disabled"}> 只考錯題本（目前 ${wrongList.length} 字）</label>
    <label class="opt"><input type="checkbox" id="doShuffle" checked> 隨機出題順序</label>
    <div class="navrow">
      <button class="btn btn-stone" id="back">◀ 返回</button>
      <button class="btn btn-gold" id="start">開始抽考 ▶</button>
    </div>
    <div class="hint">抽考時：按住右上角 🔑 才看得到答案，放手就蓋回；老師按「答對／答錯」記分</div></div>`;
  document.getElementById("back").onclick=()=>{S.mode="review"; viewStudy();};
  document.getElementById("start").onclick=()=>{
    const types=[...document.querySelectorAll(".qt:checked")].map(x=>x.value);
    if(!types.length){alert("請至少選一種題型");return;}
    let chars=l.chars.slice();
    if(document.getElementById("onlyWrong").checked){
      const w=store.wrong[wkey()]||[]; chars=chars.filter(c=>w.includes(c.char));
    }
    let queue=[];
    chars.forEach(c=>types.forEach(tk=>queue.push({c, q:QTYPES.find(q=>q.k===tk)})));
    if(document.getElementById("doShuffle").checked) queue=shuffle(queue);
    S.quiz={queue, idx:0, ok:0, no:0, hint:document.getElementById("useHint").checked};
    sPlace(); renderQuizCard();
  };
}

// ---- 抽考出題 ----
function renderQuizCard(){
  const Q=S.quiz;
  if(Q.idx>=Q.queue.length){ return renderQuizDone(); }
  const {c,q}=Q.queue[Q.idx];
  const showVal=q.show(c), ansVal=q.ans(c);
  const isChar=(q.k!=="word2char");
  const total=Q.queue.length, pct=Math.round(Q.idx/total*100);
  const hearts="❤️".repeat(Math.min(Q.ok,10))||"—";
  const hintHTML = Q.hint ? `<div class="hintword">📖 生詞：${hintWord(c)}</div>` : "";
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="hud">
      <span class="hearts">${hearts}</span>
      <span class="expbar"><i style="width:${pct}%"></i></span>
      <span class="hudtxt">第 ${Q.idx+1}/${total} ‧ ❌${Q.no}</span>
    </div>
    <div class="q-prompt">${esc(q.t)}</div>
    <div class="${isChar?'char-big kai':'zhuyin'}" id="qShow" style="cursor:pointer">${esc(showVal)}</div>
    <div class="spk">👆 點題目可念音</div>
    ${hintHTML}
    <div style="margin-top:6px"><div class="cover-wrap">
      <div class="answer-box"><span class="${q.k==='word2char'?'char-big kai':'zhuyin'}" style="font-size:${q.k==='makeword'?'18px':''}">${esc(ansVal)}</span></div>
      <div class="cover" id="cover">⛏️ 點一下挖開答案<div class="crack" id="crack"></div></div>
    </div></div>
    <div class="judge">
      <button class="btn btn-green" id="ok">答對 ✓</button>
      <button class="btn btn-red" id="no">答錯 ✗</button>
    </div>
    <div class="navrow"><button class="btn btn-stone" id="stop">結束抽考</button></div>
    <div class="hint">點一下方塊挖開答案，再點一下蓋回（學生看不到）</div></div>`;
  const sayText=c.say||c.char;
  document.getElementById("qShow").onclick=()=>{sClick(); speak(sayText);};
  if(q.k==="word2char") speak(sayText);
  const cover=document.getElementById("cover"), crack=document.getElementById("crack");
  let broken=false;
  cover.addEventListener("click",()=>{
    if(broken){ // 再點一下：方塊重組蓋回
      broken=false; cover.classList.remove("breaking"); cover.style.display="flex"; crack.style.opacity=0;
    } else { // 點一下：破壞方塊 → 裂紋＋碎片飛散 → 露答案
      broken=true; sBreak(); crack.style.opacity=1; cover.classList.add("breaking"); spawnDebris(cover);
      setTimeout(()=>{ if(broken) cover.style.display="none"; }, 360);
    }
  });
  document.getElementById("ok").onclick=()=>{
    Q.ok++; Q.combo=(Q.combo||0)+1; store.stats.quizOk++; store.stats.quizTotal++; saveStore();
    sComboTone(Q.combo); if(Q.combo>=2) comboPop(Q.combo);
    addXP(5); if(Q.combo>=10) unlock("combo10");
    buddyReact('happy'); removeWrong(c.char); Q.idx++; renderQuizCard();
  };
  document.getElementById("no").onclick=()=>{
    Q.no++; Q.combo=0; store.stats.quizTotal++; saveStore();
    sNo(); buddyReact('sad'); addWrong(c.char); Q.idx++; renderQuizCard();
  };
  document.getElementById("stop").onclick=()=>renderQuizDone();
}
function addWrong(ch){ const k=wkey(); store.wrong[k]=store.wrong[k]||[]; if(!store.wrong[k].includes(ch))store.wrong[k].push(ch); saveStore(); }
function removeWrong(ch){ const k=wkey(); if(store.wrong[k]) store.wrong[k]=store.wrong[k].filter(x=>x!==ch); saveStore(); }

// ---- 抽考結算 ----
function renderQuizDone(){
  const Q=S.quiz, total=Q.ok+Q.no, pct=total?Math.round(Q.ok/total*100):0;
  sWin();
  if(total>0 && pct===100){ unlock("perfect"); collectGem(); }
  const wlist=store.wrong[wkey()]||[], lc=lesson().chars;
  const chips=wlist.length? wlist.map(ch=>{const cc=lc.find(x=>x.char===ch); const sy=cc?(cc.say||ch):ch;
      return `<span class="wrongchip" data-ch="${esc(ch)}" data-say="${esc(sy)}">${esc(ch)}</span>`;}).join("")
                          : `<div class="empty">這關錯題本是空的，太棒了！🏆</div>`;
  const medal = pct===100?"🏆 全部答對！":(pct>=80?"⭐ 闖關高手！":(pct>=60?"💪 再接再厲！":"🌱 多練習會更棒！"));
  document.getElementById("sub").innerHTML=`<div class="card block">
    <div class="bigstat">
      <div class="levelup">${medal}</div>
      <div class="num">${pct}分</div>
      <div class="expbar" style="max-width:320px;margin:8px auto"><i style="width:${pct}%"></i></div>
      <div class="statline">答對 ${Q.ok} ‧ 答錯 ${Q.no}（共 ${total} 題）</div></div>
    <div class="field full"><div class="lab">📕 本關錯題本（點字念音）</div><div style="margin-top:6px">${chips}</div></div>
    <div class="navrow">
      <button class="btn btn-gold" id="again">再考一次</button>
      <button class="btn btn-stone" id="back">返回關卡</button>
    </div></div>`;
  document.querySelectorAll(".wrongchip").forEach(x=>x.onclick=()=>{sClick(); speak(x.dataset.say||x.dataset.ch);});
  document.getElementById("again").onclick=()=>{sClick(); renderQuizSetup();};
  document.getElementById("back").onclick=()=>{sClick(); viewLessons();};
}

// ====== 頂部按鈕 ======
function syncOptBtns(){
  document.getElementById("btnVoice").classList.toggle("on",store.opt.voice);
  document.getElementById("btnSound").classList.toggle("on",store.opt.sound);
}
document.getElementById("btnVoice").onclick=function(){store.opt.voice=!store.opt.voice; saveStore(); syncOptBtns(); if(store.opt.voice)speak("你好");};
document.getElementById("btnSound").onclick=function(){store.opt.sound=!store.opt.sound; saveStore(); syncOptBtns(); if(store.opt.sound)sOk();};
// 背景音樂：優先播放 audio/bgm.mp3（免版稅檔），載入失敗才退回合成鋼琴 loop；預設關
if(store.opt.bgm===undefined) store.opt.bgm=false;
const btnBgm=document.getElementById("btnBgm");
const bgm=document.getElementById("bgm"); bgm.volume=0.35;
let bgmTimer=null, bgmStep=0;
const BGM_SEQ=[392,440,523,440, 392,330,392,294, 330,392,440,523, 440,392,330,294];
function bgmNote(freq,dur,vol){ const a=ac(); if(!a)return;
  const o=a.createOscillator(), g=a.createGain(); o.type="triangle"; o.frequency.value=freq;
  const t=a.currentTime; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+0.04);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur); }
function startSynth(){ if(bgmTimer||!ac()) return; bgmStep=0;
  const tick=()=>{ const f=BGM_SEQ[bgmStep%BGM_SEQ.length]; bgmNote(f,1.6,0.05);
    if(bgmStep%4===0) bgmNote(f/2,2.0,0.04); bgmStep++; };
  tick(); bgmTimer=setInterval(tick,720); }
function stopSynth(){ if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null;} }
btnBgm.onclick=function(){
  store.opt.bgm=!store.opt.bgm; saveStore(); btnBgm.classList.toggle("on",store.opt.bgm);
  if(store.opt.bgm){ bgm.play().catch(()=>startSynth()); } else { bgm.pause(); stopSynth(); }
};

syncOptBtns();
updateStreak();
renderHUD();
renderBuddy('idle'); spawnCritters(); spawnBirds(); setTimeout(hideLoading,700);

document.getElementById("unlockClose").onclick=()=>{ sClick(); document.getElementById("unlockModal").classList.remove("show"); };
document.getElementById("strokeReplay").onclick=()=>{ if(hw) hw.animateCharacter(); };
if(!DATA.grades.length){ elView.innerHTML='<div class="empty">找不到生字資料（data/words.js）</div>'; }
else viewHome();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
